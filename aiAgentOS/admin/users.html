<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户管理 - aiAgentOS</title>
  <link rel="stylesheet" href="/design/tokens.css">
  <link rel="stylesheet" href="/src/styles/common.css">
  <link rel="stylesheet" href="/admin/styles/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="logo"><span>aiAgentOS</span> 管理后台</div>
      <nav><ul class="admin-nav">
        <div class="nav-section">概览</div>
        <li><a href="/admin/index.html"><span class="nav-icon">&#9632;</span> 仪表盘</a></li>
        <div class="nav-section">用户与权限</div>
        <li><a href="/admin/users.html" class="active"><span class="nav-icon">&#9632;</span> 用户管理</a></li>
        <li><a href="/admin/roles.html"><span class="nav-icon">&#9632;</span> 角色管理</a></li>
        <li><a href="/admin/permissions.html"><span class="nav-icon">&#9632;</span> 权限管理</a></li>
        <div class="nav-section">数据</div>
        <li><a href="/admin/data-warehouse.html"><span class="nav-icon">&#9632;</span> 数据仓库</a></li>
        <li><a href="/admin/logs.html"><span class="nav-icon">&#9632;</span> 系统日志</a></li>
        <div class="nav-section">系统</div>
        <li><a href="/admin/settings.html"><span class="nav-icon">&#9632;</span> 系统设置</a></li>
        <li><a href="/index.html"><span class="nav-icon">&#9632;</span> 返回前台</a></li>
      </ul></nav>
    </aside>

    <main class="admin-main">
      <div class="admin-header">
        <h1>用户管理</h1>
        <div class="breadcrumb"><a href="/admin/index.html">后台管理</a> / 用户管理</div>
      </div>

      <!-- 筛选栏 -->
      <div class="filter-bar">
        <input type="text" id="search-input" placeholder="搜索姓名或手机号...">
        <select id="role-filter">
          <option value="all">全部角色</option>
          <option value="citizen">个人用户</option>
          <option value="enterprise">企业用户</option>
          <option value="staff">政务人员</option>
        </select>
        <button class="btn btn-primary" onclick="loadUsers()">搜索</button>
      </div>

      <!-- 用户列表 -->
      <div class="content-card">
        <div class="card-header">
          <h2>用户列表</h2>
          <span class="badge badge-info" id="total-count">- 条记录</span>
        </div>
        <div class="card-body" style="padding: 0;">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>姓名</th>
                <th>手机号</th>
                <th>角色</th>
                <th>状态</th>
                <th>注册时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="user-table"></tbody>
          </table>
        </div>
        <div style="padding: 16px 20px; display: flex; justify-content: space-between; align-items: center;">
          <span id="page-info" style="font-size: 13px; color: var(--text-mute);"></span>
          <div style="display: flex; gap: 8px;">
            <button class="btn btn-ghost" id="prev-btn" onclick="changePage(-1)">上一页</button>
            <button class="btn btn-ghost" id="next-btn" onclick="changePage(1)">下一页</button>
          </div>
        </div>
      </div>

      <!-- 编辑用户模态框 -->
      <div class="modal-overlay" id="edit-modal">
        <div class="modal">
          <div class="modal-header">
            <h3>编辑用户</h3>
            <button class="modal-close" onclick="closeModal('edit-modal')">&times;</button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="edit-user-id">
            <div class="form-group">
              <label>姓名</label>
              <input type="text" id="edit-name">
            </div>
            <div class="form-group">
              <label>性别</label>
              <select id="edit-gender">
                <option value="男">男</option>
                <option value="女">女</option>
              </select>
            </div>
            <div class="form-group">
              <label>邮箱</label>
              <input type="email" id="edit-email">
            </div>
            <div class="form-group">
              <label>地址</label>
              <input type="text" id="edit-address">
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn btn-ghost" onclick="closeModal('edit-modal')">取消</button>
            <button class="btn btn-primary" onclick="saveUser()">保存</button>
          </div>
        </div>
      </div>

      <!-- 重置密码结果模态框 -->
      <div class="modal-overlay" id="reset-modal">
        <div class="modal">
          <div class="modal-header">
            <h3>密码重置成功</h3>
            <button class="modal-close" onclick="closeModal('reset-modal')">&times;</button>
          </div>
          <div class="modal-body">
            <p>临时密码为：</p>
            <p style="font-family: var(--font-mono); font-size: 20px; font-weight: 700; color: var(--accent); padding: 12px; background: var(--surface-3); text-align: center; border-radius: 4px;" id="temp-password"></p>
            <p style="font-size: 13px; color: var(--text-mute); margin-top: 8px;">请通知用户使用此密码登录后尽快修改。</p>
          </div>
          <div class="modal-footer">
            <button class="btn btn-primary" onclick="closeModal('reset-modal')">确定</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/src/scripts/api.js"></script>
  <script src="/admin/scripts/admin-api.js"></script>
  <script>
    let currentPage = 1;
    const pageSize = 10;

    document.addEventListener('DOMContentLoaded', () => {
      if (!API.getToken()) { window.location.href = '/src/login.html'; return; }
      const user = API.getUser();
      if (!user || user.role !== 'staff') { alert('权限不足'); window.location.href = '/index.html'; return; }
      loadUsers();
    });

    async function loadUsers() {
      const keyword = document.getElementById('search-input').value;
      const role = document.getElementById('role-filter').value;
      try {
        const res = await AdminAPI.getUsers({ keyword, role, page: currentPage, limit: pageSize });
        if (!res.success) return;
        document.getElementById('total-count').textContent = res.total + ' 条记录';
        document.getElementById('page-info').textContent = `第 ${res.page} 页 / 共 ${Math.ceil(res.total / pageSize)} 页`;

        const roleLabels = { citizen: '个人用户', enterprise: '企业用户', staff: '政务人员' };
        document.getElementById('user-table').innerHTML = res.users.map(u => `
          <tr>
            <td>${u.id}</td>
            <td>${escapeHTML(u.name)}</td>
            <td>${escapeHTML(u.phone)}</td>
            <td><span class="badge ${u.role === 'staff' ? 'badge-info' : u.role === 'enterprise' ? 'badge-warning' : 'badge-success'}">${roleLabels[u.role] || u.role}</span></td>
            <td>${u.disabled ? '<span class="badge badge-error">已禁用</span>' : '<span class="badge badge-success">正常</span>'}</td>
            <td>${u.createdAt ? u.createdAt.slice(0, 10) : '-'}</td>
            <td>
              <button class="btn btn-ghost" style="padding: 4px 8px; font-size: 12px;" onclick="editUser('${u.id}')">编辑</button>
              <button class="btn btn-ghost" style="padding: 4px 8px; font-size: 12px;" onclick="toggleUser('${u.id}')">${u.disabled ? '启用' : '禁用'}</button>
              <button class="btn btn-ghost" style="padding: 4px 8px; font-size: 12px;" onclick="resetPwd('${u.id}')">重置密码</button>
            </td>
          </tr>
        `).join('');

        document.getElementById('prev-btn').disabled = currentPage <= 1;
        document.getElementById('next-btn').disabled = currentPage >= Math.ceil(res.total / pageSize);
      } catch (err) {
        console.error(err);
      }
    }

    function changePage(delta) {
      currentPage += delta;
      if (currentPage < 1) currentPage = 1;
      loadUsers();
    }

    async function editUser(id) {
      const res = await AdminAPI.getUser(id);
      if (!res.success) return;
      const u = res.user;
      document.getElementById('edit-user-id').value = u.id;
      document.getElementById('edit-name').value = u.name || '';
      document.getElementById('edit-gender').value = u.gender || '男';
      document.getElementById('edit-email').value = u.email || '';
      document.getElementById('edit-address').value = u.address || '';
      document.getElementById('edit-modal').classList.add('active');
    }

    async function saveUser() {
      const id = document.getElementById('edit-user-id').value;
      const data = {
        name: document.getElementById('edit-name').value,
        gender: document.getElementById('edit-gender').value,
        email: document.getElementById('edit-email').value,
        address: document.getElementById('edit-address').value
      };
      const res = await AdminAPI.updateUser(id, data);
      if (res.success) {
        closeModal('edit-modal');
        loadUsers();
      } else {
        alert(res.message || '保存失败');
      }
    }

    async function toggleUser(id) {
      if (!confirm('确定要切换该用户的状态吗？')) return;
      const res = await AdminAPI.toggleUser(id);
      if (res.success) loadUsers();
    }

    async function resetPwd(id) {
      if (!confirm('确定要重置该用户的密码吗？')) return;
      const res = await AdminAPI.resetPassword(id);
      if (res.success) {
        document.getElementById('temp-password').textContent = res.tempPassword;
        document.getElementById('reset-modal').classList.add('active');
      }
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove('active');
    }
  </script>
</body>
</html>
