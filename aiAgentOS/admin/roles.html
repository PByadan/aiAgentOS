<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>角色管理 - aiAgentOS</title>
  <link rel="stylesheet" href="/design/tokens.css">
  <link rel="stylesheet" href="/src/styles/common.css">
  <link rel="stylesheet" href="/admin/styles/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="logo"><span>aiAgentOS</span> 管理后台</div>
      <nav><ul class="admin-nav">
        <div class="nav-section">概览</div>
        <li><a href="/admin/index.html"><span class="nav-icon">&#9632;</span> 仪表盘</a></li>
        <div class="nav-section">用户与权限</div>
        <li><a href="/admin/users.html"><span class="nav-icon">&#9632;</span> 用户管理</a></li>
        <li><a href="/admin/roles.html" class="active"><span class="nav-icon">&#9632;</span> 角色管理</a></li>
        <li><a href="/admin/permissions.html"><span class="nav-icon">&#9632;</span> 权限管理</a></li>
        <div class="nav-section">数据</div>
        <li><a href="/admin/data-warehouse.html"><span class="nav-icon">&#9632;</span> 数据仓库</a></li>
        <li><a href="/admin/logs.html"><span class="nav-icon">&#9632;</span> 系统日志</a></li>
        <div class="nav-section">系统</div>
        <li><a href="/admin/settings.html"><span class="nav-icon">&#9632;</span> 系统设置</a></li>
        <li><a href="/index.html"><span class="nav-icon">&#9632;</span> 返回前台</a></li>
      </ul></nav>
    </aside>

    <main class="admin-main">
      <div class="admin-header">
        <h1>角色管理</h1>
        <div class="breadcrumb"><a href="/admin/index.html">后台管理</a> / 角色管理</div>
      </div>

      <div class="filter-bar">
        <button class="btn btn-primary" onclick="showCreateModal()">新建角色</button>
      </div>

      <div class="content-card">
        <div class="card-header">
          <h2>角色列表</h2>
        </div>
        <div class="card-body" style="padding: 0;">
          <table>
            <thead>
              <tr>
                <th>角色标识</th>
                <th>角色名称</th>
                <th>用户数</th>
                <th>类型</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="role-table"></tbody>
          </table>
        </div>
      </div>

      <!-- 新建角色模态框 -->
      <div class="modal-overlay" id="create-modal">
        <div class="modal">
          <div class="modal-header">
            <h3>新建角色</h3>
            <button class="modal-close" onclick="closeModal('create-modal')">&times;</button>
          </div>
          <div class="modal-body">
            <div class="form-group">
              <label>角色标识（英文）</label>
              <input type="text" id="new-role-name" placeholder="如: inspector">
            </div>
            <div class="form-group">
              <label>角色名称（中文）</label>
              <input type="text" id="new-role-label" placeholder="如: 监察人员">
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn btn-ghost" onclick="closeModal('create-modal')">取消</button>
            <button class="btn btn-primary" onclick="createRole()">创建</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/src/scripts/api.js"></script>
  <script src="/admin/scripts/admin-api.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!API.getToken()) { window.location.href = '/src/login.html'; return; }
      if (API.getUser()?.role !== 'staff') { alert('权限不足'); window.location.href = '/index.html'; return; }
      loadRoles();
    });

    async function loadRoles() {
      try {
        const res = await AdminAPI.getRoles();
        if (!res.success) return;
        document.getElementById('role-table').innerHTML = res.roles.map(r => `
          <tr>
            <td><code>${escapeHTML(r.name)}</code></td>
            <td>${escapeHTML(r.label)}</td>
            <td>${r.userCount}</td>
            <td>${r.system ? '<span class="badge badge-info">系统</span>' : '<span class="badge badge-warning">自定义</span>'}</td>
            <td>
              ${!r.system ? `<button class="btn btn-ghost" style="padding: 4px 8px; font-size: 12px;" onclick="deleteRole('${r.name}')">删除</button>` : '<span style="color: var(--text-faint); font-size: 12px;">不可操作</span>'}
            </td>
          </tr>
        `).join('');
      } catch (err) {
        console.error(err);
      }
    }

    function showCreateModal() {
      document.getElementById('new-role-name').value = '';
      document.getElementById('new-role-label').value = '';
      document.getElementById('create-modal').classList.add('active');
    }

    async function createRole() {
      const name = document.getElementById('new-role-name').value.trim();
      const label = document.getElementById('new-role-label').value.trim();
      if (!name || !label) { alert('请填写完整信息'); return; }
      const res = await AdminAPI.createRole({ name, label });
      if (res.success) {
        closeModal('create-modal');
        loadRoles();
      } else {
        alert(res.message || '创建失败');
      }
    }

    async function deleteRole(name) {
      if (!confirm(`确定删除角色 "${name}" 吗？`)) return;
      const res = await AdminAPI.deleteRole(name);
      if (res.success) loadRoles();
      else alert(res.message || '删除失败');
    }

    function closeModal(id) { document.getElementById(id).classList.remove('active'); }
  </script>
</body>
</html>
