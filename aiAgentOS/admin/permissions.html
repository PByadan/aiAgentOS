<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>权限管理 - aiAgentOS</title>
  <link rel="stylesheet" href="/design/tokens.css">
  <link rel="stylesheet" href="/src/styles/common.css">
  <link rel="stylesheet" href="/admin/styles/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="logo"><span>aiAgentOS</span> 管理后台</div>
      <nav><ul class="admin-nav">
        <div class="nav-section">概览</div>
        <li><a href="/admin/index.html"><span class="nav-icon">&#9632;</span> 仪表盘</a></li>
        <div class="nav-section">用户与权限</div>
        <li><a href="/admin/users.html"><span class="nav-icon">&#9632;</span> 用户管理</a></li>
        <li><a href="/admin/roles.html"><span class="nav-icon">&#9632;</span> 角色管理</a></li>
        <li><a href="/admin/permissions.html" class="active"><span class="nav-icon">&#9632;</span> 权限管理</a></li>
        <div class="nav-section">数据</div>
        <li><a href="/admin/data-warehouse.html"><span class="nav-icon">&#9632;</span> 数据仓库</a></li>
        <li><a href="/admin/logs.html"><span class="nav-icon">&#9632;</span> 系统日志</a></li>
        <div class="nav-section">系统</div>
        <li><a href="/admin/settings.html"><span class="nav-icon">&#9632;</span> 系统设置</a></li>
        <li><a href="/index.html"><span class="nav-icon">&#9632;</span> 返回前台</a></li>
      </ul></nav>
    </aside>

    <main class="admin-main">
      <div class="admin-header">
        <h1>权限管理</h1>
        <div class="breadcrumb"><a href="/admin/index.html">后台管理</a> / 权限管理</div>
      </div>

      <div class="content-card">
        <div class="card-header">
          <h2>权限矩阵</h2>
          <button class="btn btn-primary" onclick="saveAllPermissions()">保存更改</button>
        </div>
        <div class="card-body" style="overflow-x: auto;">
          <table class="perm-matrix" id="perm-table">
            <thead>
              <tr id="perm-header">
                <th>权限</th>
              </tr>
            </thead>
            <tbody id="perm-body"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="/src/scripts/api.js"></script>
  <script src="/admin/scripts/admin-api.js"></script>
  <script>
    let rolesData = [];
    let permissionsData = [];
    let rolePermissionsData = {};

    document.addEventListener('DOMContentLoaded', () => {
      if (!API.getToken()) { window.location.href = '/src/login.html'; return; }
      if (API.getUser()?.role !== 'staff') { alert('权限不足'); window.location.href = '/index.html'; return; }
      loadPermissions();
    });

    async function loadPermissions() {
      try {
        const [permRes, roleRes] = await Promise.all([
          AdminAPI.getPermissions(),
          AdminAPI.getRoles()
        ]);

        if (!permRes.success || !roleRes.success) return;

        permissionsData = permRes.permissions;
        rolePermissionsData = permRes.rolePermissions;
        rolesData = roleRes.roles;

        renderMatrix();
      } catch (err) {
        console.error(err);
      }
    }

    function renderMatrix() {
      // 表头
      const header = document.getElementById('perm-header');
      header.innerHTML = '<th style="text-align: left;">权限</th>' +
        rolesData.map(r => `<th>${escapeHTML(r.label)}<br><small style="color: var(--text-faint);">${r.name}</small></th>`).join('');

      // 表体
      const body = document.getElementById('perm-body');
      body.innerHTML = permissionsData.map(p => {
        const cells = rolesData.map(r => {
          const checked = (rolePermissionsData[r.name] || []).includes(p.id);
          return `<td><input type="checkbox" data-role="${r.name}" data-perm="${p.id}" ${checked ? 'checked' : ''}></td>`;
        }).join('');
        return `<tr>
          <td>${escapeHTML(p.label)}<br><small style="color: var(--text-faint);">${p.id}</small></td>
          ${cells}
        </tr>`;
      }).join('');
    }

    async function saveAllPermissions() {
      const checkboxes = document.querySelectorAll('#perm-body input[type="checkbox"]');
      const changes = {};

      checkboxes.forEach(cb => {
        const role = cb.dataset.role;
        const perm = cb.dataset.perm;
        if (!changes[role]) changes[role] = [];
        if (cb.checked) changes[role].push(perm);
      });

      try {
        for (const [role, perms] of Object.entries(changes)) {
          await AdminAPI.setRolePermissions(role, perms);
        }
        alert('权限保存成功');
      } catch (err) {
        alert('保存失败: ' + err.message);
      }
    }
  </script>
</body>
</html>
