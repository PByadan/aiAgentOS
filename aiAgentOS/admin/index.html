<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>aiAgentOS 后台管理</title>
  <link rel="stylesheet" href="/design/tokens.css">
  <link rel="stylesheet" href="/src/styles/common.css">
  <link rel="stylesheet" href="/admin/styles/admin.css">
</head>
<body>
  <div class="admin-layout">
    <!-- 侧边栏 -->
    <aside class="admin-sidebar">
      <div class="logo"><span>aiAgentOS</span> 管理后台</div>
      <nav>
        <ul class="admin-nav">
          <div class="nav-section">概览</div>
          <li><a href="/admin/index.html" class="active"><span class="nav-icon">&#9632;</span> 仪表盘</a></li>
          <div class="nav-section">用户与权限</div>
          <li><a href="/admin/users.html"><span class="nav-icon">&#9632;</span> 用户管理</a></li>
          <li><a href="/admin/roles.html"><span class="nav-icon">&#9632;</span> 角色管理</a></li>
          <li><a href="/admin/permissions.html"><span class="nav-icon">&#9632;</span> 权限管理</a></li>
          <div class="nav-section">数据</div>
          <li><a href="/admin/data-warehouse.html"><span class="nav-icon">&#9632;</span> 数据仓库</a></li>
          <li><a href="/admin/logs.html"><span class="nav-icon">&#9632;</span> 系统日志</a></li>
          <div class="nav-section">系统</div>
          <li><a href="/admin/settings.html"><span class="nav-icon">&#9632;</span> 系统设置</a></li>
          <li><a href="/index.html"><span class="nav-icon">&#9632;</span> 返回前台</a></li>
        </ul>
      </nav>
    </aside>

    <!-- 主内容 -->
    <main class="admin-main">
      <div class="admin-header">
        <h1>仪表盘</h1>
        <div class="breadcrumb"><a href="/index.html">首页</a> / 后台管理 / 仪表盘</div>
      </div>

      <!-- 统计卡片 -->
      <div class="stat-cards">
        <div class="stat-card">
          <div class="stat-label">总用户数</div>
          <div class="stat-value" id="stat-users">-</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">政策法规</div>
          <div class="stat-value" id="stat-policies">-</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">待处理诉求</div>
          <div class="stat-value" id="stat-complaints">-</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">待处理审批</div>
          <div class="stat-value" id="stat-approvals">-</div>
        </div>
      </div>

      <!-- 模块状态 -->
      <div class="content-card">
        <div class="card-header">
          <h2>已注册模块</h2>
          <span class="badge badge-info" id="module-count">- 个模块</span>
        </div>
        <div class="card-body">
          <div class="module-grid" id="module-list"></div>
        </div>
      </div>

      <!-- 最近日志 -->
      <div class="content-card">
        <div class="card-header">
          <h2>最近活动</h2>
          <a href="/admin/logs.html" class="btn btn-ghost">查看全部</a>
        </div>
        <div class="card-body" id="recent-logs">
          <p style="color: var(--text-mute); text-align: center; padding: 20px;">加载中...</p>
        </div>
      </div>
    </main>
  </div>

  <script src="/src/scripts/api.js"></script>
  <script src="/admin/scripts/admin-api.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // 检查登录状态
      if (!API.getToken()) {
        window.location.href = '/src/login.html';
        return;
      }

      const user = API.getUser();
      if (!user || user.role !== 'staff') {
        alert('权限不足，仅政务人员可访问后台管理');
        window.location.href = '/index.html';
        return;
      }

      try {
        // 加载数据总览
        const overview = await AdminAPI.getWarehouseOverview();
        if (overview.success) {
          const o = overview.overview;
          document.getElementById('stat-users').textContent = o.users.total || 0;
          document.getElementById('stat-policies').textContent = o.policies.total || 0;
          document.getElementById('stat-complaints').textContent = o.complaints.pending_acceptance || o.complaints.pending_verification || 0;
          document.getElementById('stat-approvals').textContent = o.approvals.processing || 0;
        }

        // 加载模块列表
        const modules = await AdminAPI.getModules();
        if (modules.success) {
          document.getElementById('module-count').textContent = modules.modules.length + ' 个模块';
          const grid = document.getElementById('module-list');
          grid.innerHTML = modules.modules.map(m => `
            <div class="module-card">
              <div class="module-name">${escapeHTML(m.name)}</div>
              <div class="module-version">v${escapeHTML(m.version)}</div>
              <div class="module-desc">${escapeHTML(m.description)}</div>
              <span class="module-status ok">已初始化</span>
            </div>
          `).join('');
        }

        // 加载最近日志
        const logs = await AdminAPI.getLogs({ limit: 10 });
        if (logs.success && logs.logs.length > 0) {
          const container = document.getElementById('recent-logs');
          container.innerHTML = logs.logs.map(l => `
            <div class="log-item">
              <span class="log-method ${l.method ? l.method.toLowerCase() : ''}">${escapeHTML(l.method || '-')}</span>
              <span class="log-path">${escapeHTML(l.path || '-')}</span>
              <span class="log-status">${l.statusCode || '-'}</span>
              <span class="log-duration">${l.duration || 0}ms</span>
            </div>
          `).join('');
        } else {
          document.getElementById('recent-logs').innerHTML =
            '<p style="color: var(--text-mute); text-align: center; padding: 20px;">暂无日志数据（访问前台页面后将产生日志）</p>';
        }
      } catch (err) {
        console.error('加载仪表盘数据失败:', err);
      }
    });
  </script>
</body>
</html>
