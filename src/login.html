<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 — 政务智能问答系统</title>
  <link rel="stylesheet" href="../design/tokens.css">
  <link rel="stylesheet" href="styles/common.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-6);
    }
    .auth-card {
      width: 100%;
      max-width: 420px;
      padding: var(--space-10) var(--space-8);
    }
    .auth-card .logo-block {
      text-align: center;
      margin-bottom: var(--space-8);
    }
    .auth-card .logo-block .logo-icon {
      width: 48px; height: 48px;
      background: var(--accent);
      border-radius: var(--r-sm);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-family: var(--font-display-cn);
      font-size: var(--text-xl);
      font-weight: 700;
      margin-bottom: var(--space-3);
    }
    .auth-card .logo-block h1 {
      font-size: var(--text-xl);
    }
    .auth-card .logo-block p {
      font-size: var(--text-sm);
      color: var(--text-mute);
      font-family: var(--font-sans);
      margin-top: var(--space-1);
    }
    .role-selector {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-2);
      margin-bottom: var(--space-6);
    }
    .role-btn {
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      padding: var(--space-3) var(--space-2);
      border: 1px solid var(--rule);
      border-radius: var(--r-xs);
      background: var(--surface-2);
      color: var(--text-mute);
      cursor: pointer;
      text-align: center;
      transition: all var(--dur-fast) var(--ease-out);
    }
    .role-btn:hover { border-color: var(--accent); color: var(--accent); }
    .role-btn.active {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent);
      font-weight: 600;
    }
    .auth-links {
      display: flex;
      justify-content: space-between;
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      margin-top: var(--space-4);
    }
    .auth-footer {
      text-align: center;
      margin-top: var(--space-6);
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      color: var(--text-mute);
    }
  </style>
</head>
<body>

  <div class="auth-page">
    <div class="card auth-card">
      <div class="logo-block">
        <div class="logo-icon">政</div>
        <h1>政务智能问答系统</h1>
        <p id="authSubtitle">请登录您的账号</p>
      </div>

      <!-- 角色选择 -->
      <div class="role-selector">
        <button class="role-btn active" data-role="citizen">个人用户</button>
        <button class="role-btn" data-role="enterprise">企业用户</button>
        <button class="role-btn" data-role="staff">政务人员</button>
      </div>

      <!-- 登录表单 -->
      <form id="loginForm">
        <div class="form-group">
          <label for="login-id">手机号</label>
          <input type="text" id="login-id" placeholder="请输入绑定的手机号" required>
        </div>
        <div class="form-group">
          <label for="login-pwd">密码</label>
          <input type="password" id="login-pwd" placeholder="请输入密码" required>
        </div>
        <div class="auth-links">
          <label style="display:flex; align-items:center; gap:var(--space-2); cursor:pointer;">
            <input type="checkbox" style="width:auto; padding:0;"> 记住登录
          </label>
          <a href="#">忘记密码？</a>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:var(--space-3); margin-top:var(--space-5); font-size:var(--text-base);">登 录</button>
        
        <div class="auth-links" style="justify-content:center; margin-top:var(--space-4);">
          <a href="register.html">没有账号？立即注册</a>
        </div>
      </form>

      <div class="auth-footer">
        <a href="../index.html">返回首页</a>
      </div>
    </div>
  </div>

  <script src="scripts/api.js"></script>
  <script src="scripts/common.js"></script>
  <script>
    // 角色选择
    document.querySelectorAll(".role-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".role-btn").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
      });
    });

    // 登录处理
    const loginForm = document.getElementById("loginForm");
    if (loginForm) {
      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const phone = document.getElementById("login-id").value;
        const password = document.getElementById("login-pwd").value;
        const role = document.querySelector(".role-btn.active").dataset.role;

        try {
          const res = await API.login(phone, password, role);
          if (res.success) {
            alert('登录成功！');
            if (role === 'staff') {
              window.location.href = 'dashboard.html';
            } else {
              window.location.href = '../index.html';
            }
          }
        } catch (err) {
          alert(err.message || '登录失败，请检查手机号或密码');
        }
      });
    }

  </script>
</body>
</html>
