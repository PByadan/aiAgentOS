<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据看板 — 政务智能问答系统</title>
  <link rel="stylesheet" href="../design/tokens.css">
  <link rel="stylesheet" href="styles/common.css">
  <style>
    .dashboard-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-6);
      margin-bottom: var(--space-8);
    }
    .stat-card-full {
      display: flex;
      align-items: center;
      gap: var(--space-5);
      padding: var(--space-6);
    }
    .stat-icon {
      width: 52px; height: 52px;
      border-radius: var(--r-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
    }
    .stat-icon.blue  { background: var(--accent-soft); color: var(--accent); }
    .stat-icon.green { background: var(--status-success-bg); color: var(--status-success); }
    .stat-icon.orange { background: var(--status-warning-bg); color: var(--status-warning); }
    .stat-icon.red   { background: var(--status-error-bg); color: var(--status-error); }
    .stat-info .stat-number {
      font-family: var(--font-display-en);
      font-size: var(--text-3xl);
      font-weight: 700;
      font-style: italic;
      color: var(--text);
      letter-spacing: -0.02em;
      line-height: 1.1;
    }
    .stat-info .stat-label {
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      color: var(--text-mute);
      margin-top: var(--space-1);
    }
    .stat-info .stat-trend {
      font-family: var(--font-sans);
      font-size: var(--text-xs);
      margin-top: var(--space-1);
    }
    .stat-trend.up { color: var(--status-success); }
    .stat-trend.down { color: var(--status-error); }
    .chart-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: var(--space-6);
      margin-bottom: var(--space-8);
    }
    .chart-card {
      padding: var(--space-6);
    }
    .chart-card h3 {
      font-size: var(--text-base);
      font-family: var(--font-sans);
      font-weight: 600;
      margin-bottom: var(--space-4);
    }
    .chart-placeholder {
      width: 100%;
      height: 260px;
      background: var(--surface-3);
      border-radius: var(--r-xs);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-mute);
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      position: relative;
      overflow: hidden;
    }
    /* CSS-only bar chart */
    .bar-chart {
      display: flex;
      align-items: flex-end;
      gap: var(--space-3);
      height: 200px;
      padding: var(--space-4);
      width: 100%;
    }
    .bar-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-2);
    }
    .bar {
      width: 100%;
      max-width: 48px;
      background: var(--accent);
      border-radius: var(--r-xs) var(--r-xs) 0 0;
      transition: height var(--dur-base) var(--ease-out);
    }
    .bar-label {
      font-family: var(--font-sans);
      font-size: var(--text-xs);
      color: var(--text-mute);
    }
    /* CSS-only donut */
    .donut-chart {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      position: relative;
      margin: 0 auto;
    }
    .donut-chart::after {
      content: "";
      position: absolute;
      top: 30px; left: 30px; right: 30px; bottom: 30px;
      background: var(--surface-2);
      border-radius: 50%;
    }
    .donut-legend {
      margin-top: var(--space-4);
      font-family: var(--font-sans);
      font-size: var(--text-xs);
    }
    .donut-legend-item {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-1) 0;
    }
    .donut-legend-item .dot {
      width: 10px; height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .ranking-list {
      list-style: none;
    }
    .ranking-list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-3) 0;
      border-bottom: 1px solid var(--rule);
      font-family: var(--font-sans);
      font-size: var(--text-sm);
    }
    .ranking-list li:last-child { border-bottom: none; }
    .ranking-num {
      width: 24px; height: 24px;
      border-radius: var(--r-xs);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-xs);
      font-weight: 600;
      background: var(--surface-3);
      color: var(--text-mute);
      margin-right: var(--space-2);
    }
    .ranking-num.top { background: var(--accent); color: #fff; }
    .ranking-count {
      font-weight: 600;
      color: var(--text-2);
    }
    .bottom-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-6);
    }
    @media (max-width: 768px) {
      .dashboard-stats, .chart-grid, .bottom-grid { grid-template-columns: 1fr; }
    }

    /* 简约加载与悬停动效 */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @keyframes growBar {
      from { transform: scaleY(0); }
      to { transform: scaleY(1); }
    }
    @keyframes scaleIn {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    
    .stat-card-full {
      transition: all var(--dur-normal) var(--ease-out);
      opacity: 0;
      animation: fadeInUp 0.6s var(--ease-out) forwards;
    }
    .stat-card-full:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
      border-color: var(--accent);
    }
    .dashboard-stats > div:nth-child(1) { animation-delay: 0.05s; }
    .dashboard-stats > div:nth-child(2) { animation-delay: 0.15s; }
    .dashboard-stats > div:nth-child(3) { animation-delay: 0.25s; }
    .dashboard-stats > div:nth-child(4) { animation-delay: 0.35s; }

    .chart-card, .bottom-grid > .card {
      transition: all var(--dur-normal) var(--ease-out);
      opacity: 0;
      animation: fadeInUp 0.6s var(--ease-out) forwards;
    }
    .chart-card:hover, .bottom-grid > .card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }
    .chart-grid > div:nth-child(1) { animation-delay: 0.4s; }
    .chart-grid > div:nth-child(2) { animation-delay: 0.5s; }
    .bottom-grid > div:nth-child(1) { animation-delay: 0.6s; }
    .bottom-grid > div:nth-child(2) { animation-delay: 0.7s; }

    .bar {
      transform-origin: bottom;
      animation: growBar 0.8s var(--ease-out) forwards;
    }
    .donut-chart {
      animation: scaleIn 0.8s var(--ease-out) forwards;
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="page-container">
      <a href="../index.html" class="site-logo">
        <span class="logo-icon">政</span>
        政务智能问答系统
      </a>
      <nav class="site-nav" id="mainNav">
        <a href="../index.html">首页</a>
        <a href="policies.html">政策法规</a>
        <a href="policy-analysis.html">智能解读</a>
        <a href="complaint.html">民生诉求</a>
        <a href="approval.html">行政审批</a>
        <a href="dashboard.html" class="active">数据看板</a>
      </nav>
      <div class="nav-user">
        <a href="profile.html" class="btn btn-ghost" style="font-size:var(--text-sm)">个人中心</a>
      </div>
      <button class="nav-toggle" aria-label="菜单">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main class="page-container" style="padding-top:var(--space-8); padding-bottom:var(--space-16);">
    <nav class="breadcrumb">
      <a href="../index.html">首页</a>
      <span class="sep">/</span>
      <span class="current">数据看板</span>
    </nav>

    <div class="page-title-bar" style="padding-top:0;">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <div>
          <h1>数据看板</h1>
          <p class="subtitle">政务服务业务数据概览（数据更新时间：2026-05-23 08:00）</p>
        </div>
        <div style="display:flex; gap:var(--space-2);">
          <button class="btn range-btn" data-range="today" style="font-size:var(--text-xs);">今日</button>
          <button class="btn btn-primary range-btn" data-range="month" style="font-size:var(--text-xs);">本月</button>
          <button class="btn range-btn" data-range="year" style="font-size:var(--text-xs);">本年</button>
        </div>
      </div>
    </div>

    <!-- 核心指标 -->
    <div class="dashboard-stats">
      <div class="card stat-card-full">
        <div class="stat-icon blue">&#x1F4CB;</div>
        <div class="stat-info">
          <div class="stat-number" id="statTotal">1,247</div>
          <div class="stat-label">累计办件量</div>
          <div class="stat-trend up">&#x2191; 1.2% 较上月</div>
        </div>
      </div>
      <div class="card stat-card-full">
        <div class="stat-icon green">&#x2714;</div>
        <div class="stat-info">
          <div class="stat-number" id="statRate">98.6%</div>
          <div class="stat-label">按时办结率</div>
          <div class="stat-trend up">&#x2191; 0.5% 较上月</div>
        </div>
      </div>
      <div class="card stat-card-full">
        <div class="stat-icon orange">&#x1F4AC;</div>
        <div class="stat-info">
          <div class="stat-number" id="statMonthly">856</div>
          <div class="stat-label">本月诉求量</div>
          <div class="stat-trend down">&#x2193; 2.4% 较上月</div>
        </div>
      </div>
      <div class="card stat-card-full">
        <div class="stat-icon blue">&#x1F60A;</div>
        <div class="stat-info">
          <div class="stat-number" id="statSatisfaction">96.2%</div>
          <div class="stat-label">群众满意度</div>
          <div class="stat-trend up">&#x2191; 1.1% 较上月</div>
        </div>
      </div>
    </div>

    <!-- 图表区 -->
    <div class="chart-grid">
      <!-- 柱状图 -->
      <div class="card chart-card">
        <h3 id="barChartTitle">办件量趋势</h3>
        <div class="bar-chart" id="barChart">
          <!-- 动态渲染 -->
        </div>
      </div>

      <!-- 环形图 -->
      <div class="card chart-card">
        <h3>诉求类型分布</h3>
        <div class="donut-chart" id="donutChart" style="background:conic-gradient(var(--accent) 0% 40%, var(--accent-light) 40% 65%, var(--status-success) 65% 85%, var(--status-warning) 85% 100%);"></div>
        <div class="donut-legend" id="donutLegend">
          <!-- 动态渲染图例 -->
        </div>
      </div>
    </div>

    <!-- 下方详情 -->
    <div class="bottom-grid">
      <!-- 部门排行 -->
      <div class="card" style="padding:var(--space-6);">
        <h3 style="font-size:var(--text-base); font-family:var(--font-sans); font-weight:600; margin-bottom:var(--space-4);">核心诉求占比排行</h3>
        <ul class="ranking-list" id="rankingList">
          <!-- 动态排行 -->
        </ul>
      </div>

      <!-- 最新诉求 -->
      <div class="card" style="padding:var(--space-6);">
        <h3 style="font-size:var(--text-base); font-family:var(--font-sans); font-weight:600; margin-bottom:var(--space-4);">最新诉求动态</h3>
        <div style="font-family:var(--font-sans); font-size:var(--text-sm);" id="latestComplaintsList">
          <!-- 动态渲染 -->
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="page-container">
      <p>政务智能问答系统 &copy; 2026 &middot; 技术支持：政务服务数据中心</p>
    </div>
  </footer>

  <script src="scripts/api.js"></script>
  <script src="scripts/common.js"></script>
  <script>
    let currentRange = 'month';

    document.addEventListener("DOMContentLoaded", () => {
      loadDashboardData();

      // 时间筛选按钮
      document.querySelectorAll(".range-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".range-btn").forEach(b => b.classList.remove("btn-primary"));
          btn.classList.add("btn-primary");
          currentRange = btn.dataset.range;
          loadDashboardData();
        });
      });
    });

    async function loadDashboardData() {
      try {
        // 1. 获取核心统计及图表数据
        const res = await API.getDashboardStats(currentRange);
        if (res.success) {
          // 渲染核心指标
          document.getElementById("statTotal").innerText = res.stats.totalItems.toLocaleString();
          document.getElementById("statRate").innerText = res.stats.completionRate;
          document.getElementById("statMonthly").innerText = res.stats.monthlyComplaints.toLocaleString();
          document.getElementById("statSatisfaction").innerText = res.stats.satisfactionRate;

          // 渲染诉求排行
          const rankingList = document.getElementById("rankingList");
          rankingList.innerHTML = res.rankings.map((r, i) => `
            <li>
              <span><span class="ranking-num ${i < 3 ? 'top' : ''}">${i + 1}</span> ${r.title}</span>
              <span class="ranking-count">${r.count} 件</span>
            </li>
          `).join('');

          // 渲染诉求类型分布饼图
          renderDonutChart(res.typeCounts);

          // 渲染柱状图
          renderBarChart(res.dailyCounts || []);
        }

        // 2. 获取最新诉求动态 (只有工作人员可获取完整列表，非工作人员显示模拟/个人列表)
        await loadLatestComplaints();

      } catch (err) {
        console.error('加载看板数据出错:', err);
      }
    }

    function renderDonutChart(typeCounts) {
      const typeNames = {
        infra: '基础设施', env: '环境保护', traffic: '交通出行',
        education: '教育问题', medical: '医疗卫生', housing: '住房保障',
        employment: '就业创业', other: '其他'
      };
      
      const colors = ['var(--accent)', 'var(--accent-light)', 'var(--status-success)', 'var(--status-warning)', 'var(--status-error)', 'var(--rule)'];
      
      const total = Object.values(typeCounts).reduce((sum, val) => sum + val, 0);
      if (total === 0) {
        document.getElementById("donutLegend").innerHTML = '<p style="text-align:center;color:var(--text-mute);">暂无诉求分布数据</p>';
        return;
      }

      let currentPercent = 0;
      const gradientParts = [];
      const legendHtml = [];

      Object.entries(typeCounts).forEach(([type, count], index) => {
        const percent = Math.round((count / total) * 100);
        const nextPercent = currentPercent + percent;
        const color = colors[index % colors.length];

        gradientParts.push(`${color} ${currentPercent}% ${nextPercent}%`);
        legendHtml.push(`
          <div class="donut-legend-item">
            <span class="dot" style="background:${color};"></span> 
            ${typeNames[type] || type} ${percent}% (${count}件)
          </div>
        `);

        currentPercent = nextPercent;
      });

      // 填充底色到100%
      if (currentPercent < 100) {
        gradientParts.push(`var(--rule) ${currentPercent}% 100%`);
      }

      document.getElementById("donutChart").style.background = `conic-gradient(${gradientParts.join(', ')})`;
      document.getElementById("donutLegend").innerHTML = legendHtml.join('');
    }

    const rangeTitles = { today: '今日各时段办件量', month: '本月每日办件量趋势', year: '本年每月办件量趋势' };

    function renderBarChart(dailyCounts) {
      const container = document.getElementById("barChart");
      const titleEl = document.getElementById("barChartTitle");
      titleEl.innerText = rangeTitles[currentRange] || '办件量趋势';

      if (!dailyCounts.length) {
        container.innerHTML = '<p style="width:100%;text-align:center;color:var(--text-mute);font-family:var(--font-sans);font-size:var(--text-sm);padding-top:var(--space-8);">暂无数据</p>';
        return;
      }

      const maxCount = Math.max(...dailyCounts.map(d => d.count), 1);
      const maxBarHeight = 180;

      container.innerHTML = dailyCounts.map((d, i) => {
        const height = Math.max(4, Math.round((d.count / maxCount) * maxBarHeight));
        const isLast = i === dailyCounts.length - 1;
        return `<div class="bar-group">
          <div class="bar" style="height:${height}px;${isLast ? 'background:var(--accent-light);' : ''}" title="${d.date}: ${d.count}件"></div>
          <span class="bar-label">${d.date}</span>
        </div>`;
      }).join('');
    }

    async function loadLatestComplaints() {
      const listContainer = document.getElementById("latestComplaintsList");
      const user = API.getUser();
      const statusBadges = {
        'processing': '<span class="badge badge-warning">处理中</span>',
        'material_needed': '<span class="badge badge-info">待补充</span>',
        'approved': '<span class="badge badge-success">已通过</span>',
        'rejected': '<span class="badge badge-error">已驳回</span>',
        'pending_verification': '<span class="badge badge-warning">待验收</span>',
        'resolved': '<span class="badge badge-success">已办结</span>',
        'pending_acceptance': '<span class="badge badge-info">已受理</span>'
      };

      const typeNames = {
        infra: '基础设施', env: '环境保护', traffic: '交通出行',
        education: '教育问题', medical: '医疗卫生', housing: '住房保障',
        employment: '就业创业', other: '其他'
      };

      try {
        let complaints = [];
        if (user && user.role === 'staff') {
          // 政务人员：获取全局列表
          const res = await API.getAllComplaints();
          if (res.success) complaints = res.complaints;
        } else if (user) {
          // 已登录市民：获取个人列表
          const res = await API.getMyComplaints().catch(() => ({ success: true, complaints: [] }));
          complaints = res.complaints || [];
        } else {
          // 未登录：直接使用空数组以展示下面的模拟公开动态
          complaints = [];
        }

        // 如果没有数据，显示一些模拟的最新公开动态
        if (complaints.length === 0) {
          listContainer.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; padding:var(--space-3) 0; border-bottom:1px solid var(--rule);">
              <div>
                <div style="color:var(--text-2); font-weight:500;">某路段红绿灯故障</div>
                <div style="font-size:var(--text-xs); color:var(--text-mute);">交通出行 &middot; 10 分钟前</div>
              </div>
              <span class="badge badge-warning">待处理</span>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; padding:var(--space-3) 0; border-bottom:1px solid var(--rule);">
              <div>
                <div style="color:var(--text-2); font-weight:500;">社区健身器材损坏</div>
                <div style="font-size:var(--text-xs); color:var(--text-mute);">基础设施 &middot; 30 分钟前</div>
              </div>
              <span class="badge badge-info">已受理</span>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; padding:var(--space-3) 0;">
              <div>
                <div style="color:var(--text-2); font-weight:500;">河道垃圾清理问题</div>
                <div style="font-size:var(--text-xs); color:var(--text-mute);">环境保护 &middot; 1 小时前</div>
              </div>
              <span class="badge badge-success">已办结</span>
            </div>
          `;
          return;
        }

        // 展示最新 4 条
        complaints.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
        const latest = complaints.slice(0, 4);

        listContainer.innerHTML = latest.map((c, i) => `
          <div style="display:flex; justify-content:space-between; align-items:center; padding:var(--space-3) 0; ${i < latest.length - 1 ? 'border-bottom:1px solid var(--rule);' : ''} cursor:pointer;" onclick="window.location.href='complaint.html?id=${c.id}'">
            <div>
              <div style="color:var(--text-2); font-weight:500;">${c.title}</div>
              <div style="font-size:var(--text-xs); color:var(--text-mute);">${typeNames[c.type] || c.type} &middot; 编号：${c.id}</div>
            </div>
            ${statusBadges[c.status] || c.status}
          </div>
        `).join('');

      } catch (err) {
        console.error('加载最新诉求出错:', err);
      }
    }
  </script>
</body>
</html>
