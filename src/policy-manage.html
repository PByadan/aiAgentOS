<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>政策管理 — 政务智能问答系统</title>
  <link rel="stylesheet" href="../design/tokens.css">
  <link rel="stylesheet" href="styles/common.css">
  <style>
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-6);
    }
    .policy-table {
      width: 100%;
      font-family: var(--font-sans);
      font-size: var(--text-sm);
    }
    .policy-table .title-text {
      max-width: 240px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .action-btn {
      font-family: var(--font-sans);
      font-size: var(--text-xs);
      padding: var(--space-1) var(--space-3);
      cursor: pointer;
    }
    /* 弹窗 */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal-card {
      background: var(--surface-2);
      border: 1px solid var(--rule);
      border-radius: var(--r-sm);
      padding: var(--space-8);
      width: 90%;
      max-width: 600px;
      max-height: 85vh;
      overflow-y: auto;
    }
    .modal-card h2 {
      font-size: var(--text-lg);
      margin-bottom: var(--space-6);
    }
    .modal-actions {
      display: flex;
      gap: var(--space-3);
      margin-top: var(--space-6);
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="page-container">
      <a href="../index.html" class="site-logo">
        <span class="logo-icon">政</span>
        政务智能问答系统
      </a>
      <nav class="site-nav" id="mainNav">
        <a href="../index.html">首页</a>
        <a href="policies.html">政策法规</a>
        <a href="policy-analysis.html">智能解读</a>
        <a href="complaint.html">民生诉求</a>
        <a href="approval.html">行政审批</a>
        <a href="dashboard.html">数据看板</a>
      </nav>
      <div class="nav-user">
        <a href="profile.html" class="btn btn-ghost" style="font-size:var(--text-sm)">个人中心</a>
      </div>
      <button class="nav-toggle" aria-label="菜单">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main class="page-container" style="padding-top:var(--space-8); padding-bottom:var(--space-16);">
    <nav class="breadcrumb">
      <a href="../index.html">首页</a>
      <span class="sep">/</span>
      <span class="current">政策管理</span>
    </nav>

    <div class="page-title-bar" style="padding-top:0;">
      <h1>政策管理</h1>
      <p class="subtitle">发布、编辑和删除政策法规</p>
    </div>

    <div class="toolbar">
      <span style="font-family:var(--font-sans); font-size:var(--text-sm); color:var(--text-mute);" id="policyCount"></span>
      <button class="btn btn-primary" onclick="openAddModal()">新增政策</button>
    </div>

    <div class="card" style="padding:var(--space-6);">
      <table class="policy-table">
        <thead>
          <tr>
            <th>编号</th>
            <th>标题</th>
            <th>分类</th>
            <th>发布日期</th>
            <th>状态</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="policyTableBody">
          <tr><td colspan="6" style="text-align:center; padding:var(--space-8); color:var(--text-mute);">加载中...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- 新增/编辑弹窗 -->
  <div class="modal-overlay" id="modal">
    <div class="modal-card">
      <h2 id="modalTitle">新增政策</h2>
      <form id="policyForm">
        <input type="hidden" id="editId">
        <div class="form-group">
          <label for="p-title">标题</label>
          <input type="text" id="p-title" required placeholder="请输入政策标题">
        </div>
        <div class="form-group">
          <label for="p-category">分类</label>
          <select id="p-category" required>
            <option value="国务院文件">国务院文件</option>
            <option value="行政法规">行政法规</option>
            <option value="部门规章">部门规章</option>
            <option value="地方性法规">地方性法规</option>
            <option value="营商环境">营商环境</option>
            <option value="社会保障">社会保障</option>
            <option value="教育科技">教育科技</option>
            <option value="城乡建设">城乡建设</option>
            <option value="生态环保">生态环保</option>
            <option value="医疗卫生">医疗卫生</option>
            <option value="交通运输">交通运输</option>
            <option value="就业创业">就业创业</option>
            <option value="其他">其他</option>
          </select>
        </div>
        <div class="form-group">
          <label for="p-summary">摘要</label>
          <input type="text" id="p-summary" placeholder="简要概述（可选，不填则自动截取正文前100字）">
        </div>
        <div class="form-group">
          <label for="p-content">正文内容</label>
          <textarea id="p-content" rows="8" required placeholder="请输入政策正文，支持 Markdown 格式"></textarea>
        </div>
        <div class="form-group">
          <label for="p-status">状态</label>
          <select id="p-status">
            <option value="已发布">已发布</option>
            <option value="征求意见">征求意见</option>
            <option value="已废止">已废止</option>
          </select>
        </div>
        <div class="form-group">
          <label for="p-department">发布部门</label>
          <input type="text" id="p-department" placeholder="如：国务院办公厅">
        </div>
      </form>
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="submitPolicy()">保存</button>
        <button class="btn btn-ghost" onclick="closeModal()">取消</button>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="page-container">
      <p>政务智能问答系统 &copy; 2026 &middot; 技术支持：政务服务数据中心</p>
    </div>
  </footer>

  <script src="scripts/api.js"></script>
  <script src="scripts/common.js"></script>
  <script>
    const statusBadges = {
      '已发布': '<span class="badge badge-success">已发布</span>',
      '征求意见': '<span class="badge badge-warning">征求意见</span>',
      '已废止': '<span class="badge badge-error">已废止</span>'
    };

    // 权限检查
    document.addEventListener("DOMContentLoaded", () => {
      const user = API.getUser();
      if (!user || user.role !== 'staff') {
        alert('仅政务人员可访问此页面');
        window.location.href = 'login.html';
        return;
      }
      loadPolicies();
    });

    async function loadPolicies() {
      const tbody = document.getElementById("policyTableBody");
      try {
        const res = await API.getPolicies({ limit: 100, page: 1 });
        if (!res.success || !res.policies.length) {
          tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:var(--space-8); color:var(--text-mute);">暂无政策数据</td></tr>`;
          document.getElementById("policyCount").innerText = '';
          return;
        }
        document.getElementById("policyCount").innerText = `共 ${res.total} 条政策`;
        tbody.innerHTML = res.policies.map(p => `
          <tr>
            <td>${p.id}</td>
            <td><span class="title-text">${p.title}</span></td>
            <td>${p.category}</td>
            <td>${p.publishDate || '-'}</td>
            <td>${statusBadges[p.status] || p.status}</td>
            <td>
              <button class="btn btn-ghost action-btn" onclick="openEditModal('${p.id}')">编辑</button>
              <button class="btn btn-ghost action-btn" style="color:var(--status-error);" onclick="deletePolicy('${p.id}', '${p.title.replace(/'/g, "\\'")}')">删除</button>
            </td>
          </tr>
        `).join('');
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:var(--space-8); color:var(--status-error);">加载失败</td></tr>`;
      }
    }

    function openAddModal() {
      document.getElementById("modalTitle").innerText = "新增政策";
      document.getElementById("editId").value = "";
      document.getElementById("policyForm").reset();
      document.getElementById("modal").classList.add("active");
    }

    async function openEditModal(id) {
      try {
        const res = await API.getPolicy(id);
        if (!res.success) return;
        const p = res.policy;
        document.getElementById("modalTitle").innerText = "编辑政策";
        document.getElementById("editId").value = p.id;
        document.getElementById("p-title").value = p.title;
        document.getElementById("p-category").value = p.category;
        document.getElementById("p-summary").value = p.summary || '';
        document.getElementById("p-content").value = p.content || '';
        document.getElementById("p-status").value = p.status || '已发布';
        document.getElementById("p-department").value = p.department || '';
        document.getElementById("modal").classList.add("active");
      } catch (err) {
        alert('获取政策详情失败');
      }
    }

    async function submitPolicy() {
      const title = document.getElementById("p-title").value.trim();
      const category = document.getElementById("p-category").value;
      const summary = document.getElementById("p-summary").value.trim();
      const content = document.getElementById("p-content").value.trim();
      const status = document.getElementById("p-status").value;
      const department = document.getElementById("p-department").value.trim();
      const editId = document.getElementById("editId").value;

      if (!title || !content) {
        alert('请填写标题和正文内容');
        return;
      }

      const data = { title, category, content, status };
      if (summary) data.summary = summary;
      if (department) data.department = department;

      try {
        if (editId) {
          await API.updatePolicy(editId, data);
          alert('政策更新成功');
        } else {
          await API.addPolicy(data);
          alert('政策发布成功');
        }
        closeModal();
        loadPolicies();
      } catch (err) {
        alert(err.message || '操作失败');
      }
    }

    async function deletePolicy(id, title) {
      if (!confirm(`确定要删除政策「${title}」吗？此操作不可恢复。`)) return;
      try {
        await API.deletePolicy(id);
        alert('删除成功');
        loadPolicies();
      } catch (err) {
        alert(err.message || '删除失败');
      }
    }

    function closeModal() {
      document.getElementById("modal").classList.remove("active");
    }

    // 点击遮罩关闭
    document.getElementById("modal").addEventListener("click", (e) => {
      if (e.target === e.currentTarget) closeModal();
    });
  </script>
</body>
</html>
