<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>政策法规 — 政务智能问答系统</title>
  <link rel="stylesheet" href="../design/tokens.css">
  <link rel="stylesheet" href="styles/common.css">
  <style>
    /* 搜索栏卡片式设计 */
    .search-panel {
      background: var(--surface-1);
      border: 1px solid var(--rule);
      border-radius: var(--r-md);
      padding: var(--space-6);
      margin-bottom: var(--space-8);
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-4);
      align-items: center;
    }
    .search-group {
      flex: 1;
      min-width: 280px;
      position: relative;
    }
    .search-group .search-icon {
      position: absolute;
      left: var(--space-3);
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-mute);
      pointer-events: none;
      width: 16px;
      height: 16px;
    }
    .search-group .search-input {
      width: 100%;
      padding-left: calc(var(--space-4) + 16px);
      background: var(--surface-2);
      border: 1px solid var(--rule);
      border-radius: var(--r-xs);
      transition: all var(--dur-fast) var(--ease-out);
    }
    .search-group .search-input:focus {
      border-color: var(--accent);
      background: var(--surface-1);
      box-shadow: 0 0 0 2px var(--accent-soft);
    }
    
    .filter-select {
      min-width: 140px;
      background: var(--surface-2);
      border: 1px solid var(--rule);
      border-radius: var(--r-xs);
      padding: var(--space-2) var(--space-3);
      font-size: var(--text-sm);
      color: var(--text-2);
      cursor: pointer;
      outline: none;
      transition: all var(--dur-fast) var(--ease-out);
    }
    .filter-select:focus {
      border-color: var(--accent);
      background: var(--surface-1);
    }

    /* 优化侧边栏分类列表 */
    .category-card {
      background: var(--surface-1);
      border: 1px solid var(--rule);
      border-radius: var(--r-md);
      padding: var(--space-5);
      box-shadow: var(--shadow-sm);
    }
    .category-sidebar {
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
      margin-top: var(--space-2);
    }
    .category-sidebar .cat-item {
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      padding: var(--space-3) var(--space-3);
      border-radius: var(--r-xs);
      color: var(--text-2);
      cursor: pointer;
      transition: all var(--dur-fast) var(--ease-out);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 3px solid transparent;
    }
    .category-sidebar .cat-item:hover {
      background: var(--surface-2);
      color: var(--accent);
      border-left-color: var(--accent-soft);
    }
    .category-sidebar .cat-item.active {
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 600;
      border-left-color: var(--accent);
    }
    .category-sidebar .cat-count {
      font-size: var(--text-xs);
      background: var(--surface-3);
      color: var(--text-mute);
      padding: 1px 8px;
      border-radius: var(--r-full);
      font-weight: normal;
      transition: all var(--dur-fast) var(--ease-out);
    }
    .category-sidebar .cat-item.active .cat-count {
      background: var(--accent);
      color: #fff;
    }

    /* 卡片式政策卡片 */
    .policy-card {
      background: var(--surface-1);
      border: 1px solid var(--rule);
      border-radius: var(--r-md);
      padding: var(--space-6);
      margin-bottom: var(--space-5);
      box-shadow: var(--shadow-sm);
      transition: all var(--dur-normal) var(--ease-out);
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }
    .policy-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
      border-color: var(--accent);
    }
    .policy-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: var(--space-4);
    }
    .policy-card-header h3 {
      font-size: var(--text-lg);
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
      margin: 0;
    }
    .policy-card-header h3 a {
      color: inherit;
      text-decoration: none;
      border-bottom: none;
      transition: color var(--dur-fast) var(--ease-out);
    }
    .policy-card-header h3 a:hover {
      color: var(--accent);
    }
    .policy-summary {
      font-size: var(--text-sm);
      color: var(--text-mute);
      line-height: 1.6;
      margin: 0;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .policy-card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: var(--space-4);
      margin-top: var(--space-2);
      padding-top: var(--space-3);
      border-top: 1px dashed var(--rule);
    }
    .policy-meta {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      font-family: var(--font-sans);
      font-size: var(--text-xs);
      color: var(--text-mute);
      flex-wrap: wrap;
    }
    .policy-meta-item {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
    }
    .policy-actions {
      display: flex;
      gap: var(--space-2);
    }
    .policy-actions .btn {
      padding: var(--space-2) var(--space-3);
      font-size: var(--text-xs);
    }

    /* 分类标签样式 */
    .policy-tags {
      display: flex;
      gap: var(--space-2);
      align-items: center;
    }

    .policy-layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: var(--space-8);
    }
    @media (max-width: 768px) {
      .policy-layout { grid-template-columns: 1fr; }
    }

    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      margin-top: var(--space-8);
      font-family: var(--font-sans);
      font-size: var(--text-sm);
    }
    .pagination .page-btn {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--rule);
      border-radius: var(--r-xs);
      background: var(--surface-2);
      color: var(--text-2);
      cursor: pointer;
      font-size: var(--text-sm);
      transition: all var(--dur-fast) var(--ease-out);
    }
    .pagination .page-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .pagination .page-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .pagination .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="page-container">
      <a href="../index.html" class="site-logo">
        <span class="logo-icon">政</span>
        政务智能问答系统
      </a>
      <nav class="site-nav" id="mainNav">
        <a href="../index.html">首页</a>
        <a href="policies.html" class="active">政策法规</a>
        <a href="policy-analysis.html">智能解读</a>
        <a href="complaint.html">民生诉求</a>
        <a href="approval.html">行政审批</a>
        <a href="dashboard.html">数据看板</a>
      </nav>
      <div class="nav-user">
        <a href="profile.html" class="btn btn-ghost" style="font-size:var(--text-sm)">个人中心</a>
      </div>
      <button class="nav-toggle" aria-label="菜单">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main class="page-container" style="padding-top:var(--space-8); padding-bottom:var(--space-16);">
    <nav class="breadcrumb">
      <a href="../index.html">首页</a>
      <span class="sep">/</span>
      <span class="current">政策法规</span>
    </nav>

    <div class="page-title-bar" style="padding-top:0;">
      <h1>政策法规</h1>
      <p class="subtitle">浏览、检索最新发布的政策法规文件</p>
    </div>

    <!-- 搜索与筛选 -->
    <div class="search-panel">
      <div class="search-group">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" class="search-input" placeholder="输入关键词，搜索政策标题、摘要...">
      </div>
      <select class="filter-select" id="yearFilter">
        <option>全部年份</option>
        <option>2026</option>
        <option>2025</option>
        <option>2024</option>
      </select>
      <select class="filter-select" id="statusFilter">
        <option>全部状态</option>
        <option>已发布</option>
        <option>征求意见</option>
        <option>已废止</option>
      </select>
      <button class="btn btn-primary" id="searchBtn" style="padding: var(--space-2) var(--space-5);">搜 索</button>
    </div>

    <div class="policy-layout">
      <!-- 分类 -->
      <aside>
        <div class="category-card">
          <h3 style="font-size:var(--text-sm); font-family:var(--font-sans); font-weight:600; margin-bottom:var(--space-3); color:var(--text-mute); border-bottom:1px solid var(--rule); padding-bottom:var(--space-2);">
            政策分类
          </h3>
          <div class="category-sidebar" id="categorySidebar">
            <div class="cat-item active" data-category="全部">
              <span>全部</span>
              <span class="cat-count">...</span>
            </div>
            <div class="cat-item" data-category="营商环境">
              <span>营商环境</span>
              <span class="cat-count">0</span>
            </div>
            <div class="cat-item" data-category="社会保障">
              <span>社会保障</span>
              <span class="cat-count">0</span>
            </div>
            <div class="cat-item" data-category="教育科技">
              <span>教育科技</span>
              <span class="cat-count">0</span>
            </div>
            <div class="cat-item" data-category="城乡建设">
              <span>城乡建设</span>
              <span class="cat-count">0</span>
            </div>
            <div class="cat-item" data-category="生态环保">
              <span>生态环保</span>
              <span class="cat-count">0</span>
            </div>
            <div class="cat-item" data-category="医疗卫生">
              <span>医疗卫生</span>
              <span class="cat-count">0</span>
            </div>
            <div class="cat-item" data-category="交通运输">
              <span>交通运输</span>
              <span class="cat-count">0</span>
            </div>
            <div class="cat-item" data-category="就业创业">
              <span>就业创业</span>
              <span class="cat-count">0</span>
            </div>
            <div class="cat-item" data-category="其他">
              <span>其他</span>
              <span class="cat-count">0</span>
            </div>
          </div>
        </div>
      </aside>

      <!-- 列表 -->
      <div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:var(--space-4); font-family:var(--font-sans); font-size:var(--text-sm); color:var(--text-mute);">
          <span id="totalCount">共 0 条结果</span>
          <select style="padding:var(--space-1) var(--space-2); font-size:var(--text-xs); background:var(--surface-1); border:1px solid var(--rule); border-radius:var(--r-xs);">
            <option>按发布时间排序</option>
          </select>
        </div>

        <div id="policyList">
          <!-- 动态渲染 policies -->
        </div>

        <!-- 分页 -->
        <div class="pagination" id="pagination">
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="page-container">
      <p>政务智能问答系统 &copy; 2026 &middot; 技术支持：政务服务中心</p>
    </div>
  </footer>

  <script src="scripts/api.js"></script>
  <script src="scripts/common.js"></script>
  <script>
    let currentCategory = '全部';
    let currentYear = '全部年份';
    let currentStatus = '全部状态';
    let currentKeyword = '';
    let currentPage = 1;

    async function loadCategories() {
      try {
        const res = await API.getPolicyCategories();
        if (res.success && res.counts) {
          const sidebar = document.getElementById("categorySidebar");
          const allCategories = ['全部', '营商环境', '社会保障', '教育科技', '城乡建设', '生态环保', '医疗卫生', '交通运输', '就业创业', '其他'];
          
          sidebar.innerHTML = allCategories.map(cat => {
            const count = res.counts[cat] || 0;
            const isActive = currentCategory === cat;
            return `
              <div class="cat-item ${isActive ? 'active' : ''}" data-category="${cat}">
                <span>${cat}</span>
                <span class="cat-count">${count}</span>
              </div>
            `;
          }).join('');
          
          bindCategoryEvents();
        }
      } catch (err) {
        console.error('加载分类数量失败:', err);
      }
    }

    async function loadPolicies() {
      const policyList = document.getElementById("policyList");
      policyList.innerHTML = '<div style="padding:40px; text-align:center; color:var(--text-mute);">正在获取最新政策列表...</div>';

      try {
        const res = await API.getPolicies({
          category: currentCategory,
          year: currentYear,
          status: currentStatus,
          keyword: currentKeyword,
          page: currentPage,
          limit: 5
        });

        if (res.success) {
          document.getElementById("totalCount").innerText = `共 ${res.total} 条结果`;
          
          if (res.policies.length === 0) {
            policyList.innerHTML = `
              <div class="empty-state" style="padding: 60px 20px; text-align: center; background: var(--surface-1); border: 1px solid var(--rule); border-radius: var(--r-md); box-shadow: var(--shadow-sm);">
                <div class="empty-icon" style="font-size: 48px; color: var(--text-faint); margin-bottom: var(--space-4);">
                  <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin: 0 auto; color: var(--text-faint);">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    <line x1="8" y1="11" x2="14" y2="11"></line>
                  </svg>
                </div>
                <p style="color: var(--text-mute); font-size: var(--text-base); margin-bottom: var(--space-2);">未找到相关政策法规</p>
                <p style="color: var(--text-faint); font-size: var(--text-xs);">请尝试调整搜索词或筛选条件</p>
              </div>
            `;
            renderPagination(0);
            return;
          }

          policyList.innerHTML = res.policies.map(p => {
            let badgeClass = 'badge-success';
            if (p.status === '征求意见') badgeClass = 'badge-warning';
            if (p.status === '已废止') badgeClass = 'badge-error';

            return `
              <div class="policy-card">
                <div class="policy-card-header">
                  <h3><a href="policy-detail.html?id=${escapeHTML(p.id)}">${escapeHTML(p.title)}</a></h3>
                  <div class="policy-tags">
                    <span class="badge ${badgeClass}">${escapeHTML(p.status)}</span>
                  </div>
                </div>
                <p class="policy-summary">${escapeHTML(p.summary)}</p>
                <div class="policy-card-footer">
                  <div class="policy-meta">
                    <span class="policy-meta-item">
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:2px"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>
                      ${escapeHTML(p.category)}
                    </span>
                    <span class="policy-meta-item">
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:2px"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                      ${escapeHTML(p.publishDate)}
                    </span>
                    <span class="policy-meta-item">
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:2px"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><line x1="9" y1="22" x2="9" y2="16"></line><line x1="15" y1="22" x2="15" y2="16"></line><line x1="9" y1="16" x2="15" y2="16"></line><path d="M9 6h6M9 10h6"></path></svg>
                      ${escapeHTML(p.department)}
                    </span>
                  </div>
                  <div class="policy-actions">
                    <a href="policy-detail.html?id=${escapeHTML(p.id)}" class="btn btn-sm btn-ghost">阅读原文</a>
                    <a href="policy-analysis.html?id=${escapeHTML(p.id)}" class="btn btn-sm btn-primary">AI 智能解读</a>
                  </div>
                </div>
              </div>
            `;
          }).join('');

          renderPagination(res.total);
        }
      } catch (err) {
        policyList.innerHTML = `<div style="padding:40px; text-align:center; color:var(--status-error);">获取政策数据失败: ${err.message}</div>`;
      }
    }

    function renderPagination(total) {
      const totalPages = Math.ceil(total / 5);
      const pagination = document.getElementById("pagination");
      pagination.innerHTML = '';

      if (totalPages <= 1) return;

      // 前一页
      const prevBtn = document.createElement('button');
      prevBtn.className = 'page-btn';
      prevBtn.innerHTML = '&lt;';
      prevBtn.disabled = currentPage === 1;
      prevBtn.addEventListener('click', () => {
        if (currentPage > 1) {
          currentPage--;
          loadPolicies();
        }
      });
      pagination.appendChild(prevBtn);

      // 页码
      for (let i = 1; i <= totalPages; i++) {
        const pageBtn = document.createElement('button');
        pageBtn.className = `page-btn ${currentPage === i ? 'active' : ''}`;
        pageBtn.innerText = i;
        pageBtn.addEventListener('click', () => {
          currentPage = i;
          loadPolicies();
        });
        pagination.appendChild(pageBtn);
      }

      // 后一页
      const nextBtn = document.createElement('button');
      nextBtn.className = 'page-btn';
      nextBtn.innerHTML = '&gt;';
      nextBtn.disabled = currentPage === totalPages;
      nextBtn.addEventListener('click', () => {
        if (currentPage < totalPages) {
          currentPage++;
          loadPolicies();
        }
      });
      pagination.appendChild(nextBtn);
    }

    // 分类切换事件绑定
    function bindCategoryEvents() {
      document.querySelectorAll("#categorySidebar .cat-item").forEach((item) => {
        item.addEventListener("click", () => {
          document.querySelectorAll("#categorySidebar .cat-item").forEach((i) => i.classList.remove("active"));
          item.classList.add("active");
          
          currentCategory = item.dataset.category;
          currentPage = 1;
          loadPolicies();
        });
      });
    }

    // 搜索与过滤逻辑
    const searchInput = document.querySelector(".search-input");
    const yearSelect = document.getElementById("yearFilter");
    const statusSelect = document.getElementById("statusFilter");
    const searchBtn = document.getElementById("searchBtn");

    function triggerSearch() {
      currentKeyword = searchInput ? searchInput.value.trim() : '';
      currentYear = yearSelect ? yearSelect.value : '全部年份';
      currentStatus = statusSelect ? statusSelect.value : '全部状态';
      currentPage = 1;
      loadPolicies();
    }

    if (searchBtn) {
      searchBtn.addEventListener("click", triggerSearch);
    }

    if (searchInput) {
      searchInput.addEventListener("keypress", (e) => {
        if (e.key === 'Enter') {
          triggerSearch();
        }
      });
    }

    // 初始化加载
    bindCategoryEvents();
    loadCategories();
    loadPolicies();
  </script>
</body>
</html>
