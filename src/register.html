<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>账号注册 — 政务智能问答系统</title>
  <link rel="stylesheet" href="../design/tokens.css">
  <link rel="stylesheet" href="styles/common.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-6);
    }
    .auth-card {
      width: 100%;
      max-width: 420px;
      padding: var(--space-10) var(--space-8);
    }
    .auth-card .logo-block {
      text-align: center;
      margin-bottom: var(--space-8);
    }
    .auth-card .logo-block .logo-icon {
      width: 48px; height: 48px;
      background: var(--accent);
      border-radius: var(--r-sm);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-family: var(--font-display-cn);
      font-size: var(--text-xl);
      font-weight: 700;
      margin-bottom: var(--space-3);
    }
    .auth-card .logo-block h1 {
      font-size: var(--text-xl);
    }
    .auth-card .logo-block p {
      font-size: var(--text-sm);
      color: var(--text-mute);
      font-family: var(--font-sans);
      margin-top: var(--space-1);
    }
    .role-selector {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-2);
      margin-bottom: var(--space-6);
    }
    .role-btn {
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      padding: var(--space-3) var(--space-2);
      border: 1px solid var(--rule);
      border-radius: var(--r-xs);
      background: var(--surface-2);
      color: var(--text-mute);
      cursor: pointer;
      text-align: center;
      transition: all var(--dur-fast) var(--ease-out);
    }
    .role-btn:hover { border-color: var(--accent); color: var(--accent); }
    .role-btn.active {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent);
      font-weight: 600;
    }
    .auth-links {
      display: flex;
      justify-content: space-between;
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      margin-top: var(--space-4);
    }
    .auth-footer {
      text-align: center;
      margin-top: var(--space-6);
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      color: var(--text-mute);
    }
  </style>
</head>
<body>

  <div class="auth-page">
    <div class="card auth-card">
      <div class="logo-block">
        <div class="logo-icon">政</div>
        <h1>政务智能问答系统</h1>
        <p>请注册您的新账号</p>
      </div>

      <!-- 角色选择 -->
      <div class="role-selector">
        <button class="role-btn active" data-role="citizen">个人用户</button>
        <button class="role-btn" data-role="enterprise">企业用户</button>
        <button class="role-btn" data-role="staff">政务人员</button>
      </div>

      <!-- 注册表单 -->
      <form id="registerForm">
        <div class="form-group">
          <label for="reg-name">姓名</label>
          <input type="text" id="reg-name" placeholder="请输入真实姓名" required>
        </div>
        <div class="form-group">
          <label for="reg-phone">手机号</label>
          <input type="tel" id="reg-phone" placeholder="请输入手机号" required>
        </div>
        <div class="form-group">
          <label for="reg-code">验证码</label>
          <div style="display:flex; gap:var(--space-3);">
            <input type="text" id="reg-code" placeholder="请输入验证码" required style="flex:1;">
            <button type="button" class="btn" style="white-space:nowrap;" onclick="alert('测试环境：请输入任意验证码即可。')">获取验证码</button>
          </div>
        </div>
        <div class="form-group">
          <label for="reg-pwd">设置密码</label>
          <input type="password" id="reg-pwd" placeholder="请设置 8-20 位密码" required>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:var(--space-3); margin-top:var(--space-4); font-size:var(--text-base);">注 册</button>
        
        <div class="auth-links" style="justify-content:center;">
          <a href="login.html">已有账号？立即登录</a>
        </div>
      </form>

      <div class="auth-footer">
        <a href="../index.html">返回首页</a>
      </div>
    </div>
  </div>

  <script src="scripts/api.js"></script>
  <script src="scripts/common.js"></script>
  <script>
    // 角色选择
    document.querySelectorAll(".role-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".role-btn").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
      });
    });

    // 注册处理
    const registerForm = document.getElementById("registerForm");
    if (registerForm) {
      registerForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const name = document.getElementById("reg-name").value;
        const phone = document.getElementById("reg-phone").value;
        const password = document.getElementById("reg-pwd").value;
        const role = document.querySelector(".role-btn.active").dataset.role;

        try {
          const res = await API.register(name, phone, password, role);
          if (res.success) {
            alert('注册并登录成功！');
            if (role === 'staff') {
              window.location.href = 'dashboard.html';
            } else {
              window.location.href = '../index.html';
            }
          }
        } catch (err) {
          alert(err.message || '注册失败');
        }
      });
    }
  </script>
</body>
</html>
