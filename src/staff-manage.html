<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>员工管理 — 政务智能问答系统</title>
  <link rel="stylesheet" href="../design/tokens.css">
  <link rel="stylesheet" href="styles/common.css">
  <style>
    .manage-tabs {
      display: flex;
      gap: var(--space-2);
      margin-bottom: var(--space-6);
    }
    .manage-table {
      width: 100%;
      font-family: var(--font-sans);
      font-size: var(--text-sm);
    }
    .manage-table td .title-text {
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .action-btn {
      font-family: var(--font-sans);
      font-size: var(--text-xs);
      padding: var(--space-1) var(--space-3);
      cursor: pointer;
    }
    /* 弹窗遮罩 */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal-card {
      background: var(--surface-2);
      border: 1px solid var(--rule);
      border-radius: var(--r-sm);
      padding: var(--space-8);
      width: 90%;
      max-width: 520px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal-card h2 {
      font-size: var(--text-lg);
      margin-bottom: var(--space-6);
    }
    .modal-card .detail-row {
      display: flex;
      padding: var(--space-2) 0;
      border-bottom: 1px solid var(--rule);
      font-family: var(--font-sans);
      font-size: var(--text-sm);
    }
    .modal-card .detail-label {
      width: 90px;
      flex-shrink: 0;
      color: var(--text-mute);
    }
    .modal-card .detail-value {
      color: var(--text-2);
      word-break: break-all;
    }
    .modal-actions {
      display: flex;
      gap: var(--space-3);
      margin-top: var(--space-6);
      align-items: center;
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="page-container">
      <a href="../index.html" class="site-logo">
        <span class="logo-icon">政</span>
        政务智能问答系统
      </a>
      <nav class="site-nav" id="mainNav">
        <a href="../index.html">首页</a>
        <a href="policies.html">政策法规</a>
        <a href="policy-analysis.html">智能解读</a>
        <a href="complaint.html">民生诉求</a>
        <a href="approval.html">行政审批</a>
        <a href="dashboard.html">数据看板</a>
      </nav>
      <div class="nav-user">
        <a href="profile.html" class="btn btn-ghost" style="font-size:var(--text-sm)">个人中心</a>
      </div>
      <button class="nav-toggle" aria-label="菜单">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main class="page-container" style="padding-top:var(--space-8); padding-bottom:var(--space-16);">
    <nav class="breadcrumb">
      <a href="../index.html">首页</a>
      <span class="sep">/</span>
      <span class="current">员工管理</span>
    </nav>

    <div class="page-title-bar" style="padding-top:0;">
      <h1>员工管理</h1>
      <p class="subtitle">管理诉求和审批事项</p>
    </div>

    <!-- Tab 切换 -->
    <div class="manage-tabs">
      <button class="btn btn-primary tab-btn" data-tab="complaints">诉求管理</button>
      <button class="btn tab-btn" data-tab="approvals">审批管理</button>
    </div>

    <!-- 诉求管理 -->
    <div class="tab-content active" id="tab-complaints">
      <div class="card" style="padding:var(--space-6);">
        <table class="manage-table">
          <thead>
            <tr>
              <th>诉求编号</th>
              <th>类型</th>
              <th>标题</th>
              <th>提交人</th>
              <th>提交时间</th>
              <th>状态</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="complaintTableBody">
            <tr><td colspan="7" style="text-align:center; padding:var(--space-8); color:var(--text-mute);">加载中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- 审批管理 -->
    <div class="tab-content" id="tab-approvals">
      <div class="card" style="padding:var(--space-6);">
        <table class="manage-table">
          <thead>
            <tr>
              <th>审批编号</th>
              <th>类型</th>
              <th>申请人</th>
              <th>提交时间</th>
              <th>状态</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="approvalTableBody">
            <tr><td colspan="6" style="text-align:center; padding:var(--space-8); color:var(--text-mute);">加载中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- 详情/修改弹窗 -->
  <div class="modal-overlay" id="modal">
    <div class="modal-card">
      <h2 id="modalTitle">详情</h2>
      <div id="modalBody"></div>
      <div class="modal-actions" id="modalActions"></div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="page-container">
      <p>政务智能问答系统 &copy; 2026 &middot; 技术支持：政务服务数据中心</p>
    </div>
  </footer>

  <script src="scripts/api.js"></script>
  <script src="scripts/common.js"></script>
  <script>
    const typeNames = {
      infra: '基础设施', env: '环境保护', traffic: '交通出行',
      education: '教育问题', medical: '医疗卫生', housing: '住房保障',
      employment: '就业创业', other: '其他'
    };
    const approvalTypeNames = {
      'biz-license': '工商营业执照', 'build-permit': '建设工程规划许可',
      'env-impact': '环境影响评价', 'fire-check': '消防审查',
      'land-use': '土地使用审批', 'food-permit': '食品经营许可', 'other': '其他'
    };
    const complaintStatusBadges = {
      'processing': '<span class="badge badge-warning">处理中</span>',
      'pending_verification': '<span class="badge badge-warning">待验收</span>',
      'pending_acceptance': '<span class="badge badge-info">已受理</span>',
      'resolved': '<span class="badge badge-success">已办结</span>'
    };
    const approvalStatusBadges = {
      'processing': '<span class="badge badge-warning">审核中</span>',
      'material_needed': '<span class="badge badge-info">待补充材料</span>',
      'approved': '<span class="badge badge-success">已通过</span>',
      'rejected': '<span class="badge badge-error">已驳回</span>'
    };

    // Tab 切换
    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("btn-primary"));
        btn.classList.add("btn-primary");
        document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
        document.getElementById("tab-" + btn.dataset.tab).classList.add("active");
      });
    });

    // 权限检查
    document.addEventListener("DOMContentLoaded", () => {
      const user = API.getUser();
      if (!user || user.role !== 'staff') {
        alert('仅政务人员可访问此页面');
        window.location.href = 'login.html';
        return;
      }
      loadComplaints();
      loadApprovals();
    });

    // ====== 诉求管理 ======
    async function loadComplaints() {
      const tbody = document.getElementById("complaintTableBody");
      try {
        const res = await API.getAllComplaints();
        if (!res.success || !res.complaints.length) {
          tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding:var(--space-8); color:var(--text-mute);">暂无诉求数据</td></tr>`;
          return;
        }
        const sorted = res.complaints.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
        tbody.innerHTML = sorted.map(c => `
          <tr>
            <td>${c.id}</td>
            <td>${typeNames[c.type] || c.type}</td>
            <td><span class="title-text">${c.title}</span></td>
            <td>${c.name || '-'}</td>
            <td>${c.createdAt ? c.createdAt.slice(0, 10) : '-'}</td>
            <td>${complaintStatusBadges[c.status] || c.status}</td>
            <td><button class="btn btn-ghost action-btn" onclick="showComplaintDetail('${c.id}')">查看详情</button></td>
          </tr>
        `).join('');
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding:var(--space-8); color:var(--status-error);">加载失败</td></tr>`;
      }
    }

    async function showComplaintDetail(id) {
      try {
        const res = await API.getComplaint(id);
        if (!res.success) return;
        const c = res.complaint;
        const modal = document.getElementById("modal");
        document.getElementById("modalTitle").innerText = "诉求详情";
        document.getElementById("modalBody").innerHTML = `
          <div class="detail-row"><span class="detail-label">编号</span><span class="detail-value">${c.id}</span></div>
          <div class="detail-row"><span class="detail-label">类型</span><span class="detail-value">${typeNames[c.type] || c.type}</span></div>
          <div class="detail-row"><span class="detail-label">标题</span><span class="detail-value">${c.title}</span></div>
          <div class="detail-row"><span class="detail-label">提交人</span><span class="detail-value">${c.name || '-'}</span></div>
          <div class="detail-row"><span class="detail-label">联系方式</span><span class="detail-value">${c.phone || '-'}</span></div>
          <div class="detail-row"><span class="detail-label">地址</span><span class="detail-value">${c.address || '-'}</span></div>
          <div class="detail-row"><span class="detail-label">详细描述</span><span class="detail-value">${c.detail || '-'}</span></div>
          <div class="detail-row"><span class="detail-label">当前状态</span><span class="detail-value">${complaintStatusBadges[c.status] || c.status}</span></div>
          <div style="margin-top:var(--space-4);">
            <label for="newStatus" style="font-family:var(--font-sans); font-size:var(--text-sm); color:var(--text-mute);">修改状态</label>
            <select id="newStatus" style="margin-top:var(--space-2);">
              <option value="processing" ${c.status === 'processing' ? 'selected' : ''}>处理中</option>
              <option value="pending_verification" ${c.status === 'pending_verification' ? 'selected' : ''}>待验收</option>
              <option value="resolved" ${c.status === 'resolved' ? 'selected' : ''}>已办结</option>
            </select>
          </div>
          <div style="margin-top:var(--space-3);">
            <label for="statusDesc" style="font-family:var(--font-sans); font-size:var(--text-sm); color:var(--text-mute);">处理说明</label>
            <textarea id="statusDesc" rows="2" placeholder="可选，填写处理说明" style="margin-top:var(--space-2);"></textarea>
          </div>
        `;
        document.getElementById("modalActions").innerHTML = `
          <button class="btn btn-primary" onclick="confirmUpdateComplaint('${c.id}')">确认修改</button>
          <button class="btn btn-ghost" onclick="closeModal()">取消</button>
        `;
        modal.classList.add("active");
      } catch (err) {
        alert('获取诉求详情失败');
      }
    }

    async function confirmUpdateComplaint(id) {
      const newStatus = document.getElementById("newStatus").value;
      const desc = document.getElementById("statusDesc").value;
      const statusNames = { processing: '处理中', pending_verification: '待验收', resolved: '已办结' };
      if (!confirm(`确定要将诉求状态修改为「${statusNames[newStatus]}」吗？`)) return;
      try {
        const stepTitleMap = { processing: '处理中', pending_verification: '待验收', resolved: '已办结' };
        await API.updateComplaintStatus(id, { status: newStatus, desc, stepTitle: stepTitleMap[newStatus] });
        alert('状态更新成功');
        closeModal();
        loadComplaints();
      } catch (err) {
        alert(err.message || '更新失败');
      }
    }

    // ====== 审批管理 ======
    async function loadApprovals() {
      const tbody = document.getElementById("approvalTableBody");
      try {
        const res = await API.getAllApprovals();
        if (!res.success || !res.approvals.length) {
          tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:var(--space-8); color:var(--text-mute);">暂无审批数据</td></tr>`;
          return;
        }
        const sorted = res.approvals.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
        tbody.innerHTML = sorted.map(a => `
          <tr>
            <td>${a.id}</td>
            <td>${approvalTypeNames[a.type] || a.type}</td>
            <td>${a.applicant || '-'}</td>
            <td>${a.createdAt ? a.createdAt.slice(0, 10) : '-'}</td>
            <td>${approvalStatusBadges[a.status] || a.status}</td>
            <td><button class="btn btn-ghost action-btn" onclick="showApprovalDetail('${a.id}')">查看详情</button></td>
          </tr>
        `).join('');
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:var(--space-8); color:var(--status-error);">加载失败</td></tr>`;
      }
    }

    async function showApprovalDetail(id) {
      try {
        const res = await API.getAllApprovals();
        if (!res.success) return;
        const a = res.approvals.find(x => x.id === id);
        if (!a) { alert('审批件不存在'); return; }
        const modal = document.getElementById("modal");
        document.getElementById("modalTitle").innerText = "审批详情";
        document.getElementById("modalBody").innerHTML = `
          <div class="detail-row"><span class="detail-label">编号</span><span class="detail-value">${a.id}</span></div>
          <div class="detail-row"><span class="detail-label">类型</span><span class="detail-value">${approvalTypeNames[a.type] || a.type}</span></div>
          <div class="detail-row"><span class="detail-label">申请人</span><span class="detail-value">${a.applicant || '-'}</span></div>
          <div class="detail-row"><span class="detail-label">联系人</span><span class="detail-value">${a.contact || '-'}</span></div>
          <div class="detail-row"><span class="detail-label">联系电话</span><span class="detail-value">${a.phone || '-'}</span></div>
          <div class="detail-row"><span class="detail-label">证件号</span><span class="detail-value">${a.idnum || '-'}</span></div>
          <div class="detail-row"><span class="detail-label">说明</span><span class="detail-value">${a.desc || '-'}</span></div>
          <div class="detail-row"><span class="detail-label">当前状态</span><span class="detail-value">${approvalStatusBadges[a.status] || a.status}</span></div>
          <div style="margin-top:var(--space-4);">
            <label for="newApprovalStatus" style="font-family:var(--font-sans); font-size:var(--text-sm); color:var(--text-mute);">修改状态</label>
            <select id="newApprovalStatus" style="margin-top:var(--space-2);">
              <option value="processing" ${a.status === 'processing' ? 'selected' : ''}>审核中</option>
              <option value="material_needed" ${a.status === 'material_needed' ? 'selected' : ''}>待补充材料</option>
              <option value="approved" ${a.status === 'approved' ? 'selected' : ''}>已通过</option>
              <option value="rejected" ${a.status === 'rejected' ? 'selected' : ''}>已驳回</option>
            </select>
          </div>
        `;
        document.getElementById("modalActions").innerHTML = `
          <button class="btn btn-primary" onclick="confirmUpdateApproval('${a.id}')">确认修改</button>
          <button class="btn btn-ghost" onclick="closeModal()">取消</button>
        `;
        modal.classList.add("active");
      } catch (err) {
        alert('获取审批详情失败');
      }
    }

    async function confirmUpdateApproval(id) {
      const newStatus = document.getElementById("newApprovalStatus").value;
      const statusNames = { processing: '审核中', material_needed: '待补充材料', approved: '已通过', rejected: '已驳回' };
      if (!confirm(`确定要将审批状态修改为「${statusNames[newStatus]}」吗？`)) return;
      try {
        await API.updateApprovalStatus(id, newStatus);
        alert('状态更新成功');
        closeModal();
        loadApprovals();
      } catch (err) {
        alert(err.message || '更新失败');
      }
    }

    function closeModal() {
      document.getElementById("modal").classList.remove("active");
    }

    // 点击遮罩关闭弹窗
    document.getElementById("modal").addEventListener("click", (e) => {
      if (e.target === e.currentTarget) closeModal();
    });
  </script>
</body>
</html>
