<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>民生诉求处理 — 政务智能问答系统</title>
  <link rel="stylesheet" href="../design/tokens.css">
  <link rel="stylesheet" href="styles/common.css">
  <style>
    .complaint-layout {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: var(--space-8);
    }
    .complaint-form-card {
      padding: var(--space-8);
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-4);
    }
    .file-upload-area {
      border: 1px dashed var(--rule);
      border-radius: var(--r-xs);
      padding: var(--space-4);
      text-align: center;
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      color: var(--text-mute);
      cursor: pointer;
      transition: border-color var(--dur-fast) var(--ease-out);
    }
    .file-upload-area:hover { border-color: var(--accent); }
    .tracking-card {
      position: sticky;
      top: calc(var(--header-height) + var(--space-8));
    }
    .tracking-search {
      display: flex;
      gap: var(--space-3);
      margin-bottom: var(--space-6);
    }
    .tracking-search input { flex: 1; }
    .tracking-result {
      display: none;
    }
    .tracking-result.show { display: block; }
    .complaint-summary {
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      padding: var(--space-4);
      background: var(--surface-3);
      border-radius: var(--r-xs);
      margin-bottom: var(--space-6);
    }
    .complaint-summary .summary-title {
      font-weight: 600;
      color: var(--text-2);
      margin-bottom: var(--space-2);
    }
    .complaint-summary .summary-meta {
      color: var(--text-mute);
      font-size: var(--text-xs);
    }
    @media (max-width: 768px) {
      .complaint-layout { grid-template-columns: 1fr; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="page-container">
      <a href="../index.html" class="site-logo">
        <span class="logo-icon">政</span>
        政务智能问答系统
      </a>
      <nav class="site-nav" id="mainNav">
        <a href="../index.html">首页</a>
        <a href="policies.html">政策法规</a>
        <a href="policy-analysis.html">智能解读</a>
        <a href="complaint.html" class="active">民生诉求</a>
        <a href="approval.html">行政审批</a>
        <a href="dashboard.html">数据看板</a>
      </nav>
      <div class="nav-user">
        <a href="profile.html" class="btn btn-ghost" style="font-size:var(--text-sm)">个人中心</a>
      </div>
      <button class="nav-toggle" aria-label="菜单">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main class="page-container" style="padding-top:var(--space-8); padding-bottom:var(--space-16);">
    <nav class="breadcrumb">
      <a href="../index.html">首页</a>
      <span class="sep">/</span>
      <span class="current">民生诉求处理</span>
    </nav>

    <div class="page-title-bar" style="padding-top:0;">
      <h1>民生诉求处理</h1>
      <p class="subtitle">在线提交您的诉求与建议，我们将及时处理并反馈</p>
    </div>

    <div class="complaint-layout">
      <!-- 左：提交表单 -->
      <div class="card complaint-form-card">
        <h2 style="font-size:var(--text-lg); margin-bottom:var(--space-6);">提交新诉求</h2>

        <form id="complaintForm">
          <div class="form-row">
            <div class="form-group">
              <label for="c-name">姓名</label>
              <input type="text" id="c-name" placeholder="请输入您的姓名" required>
            </div>
            <div class="form-group">
              <label for="c-phone">联系电话</label>
              <input type="tel" id="c-phone" placeholder="请输入手机号" required>
            </div>
          </div>

          <div class="form-group">
            <label for="c-type">诉求类型</label>
            <select id="c-type" required>
              <option value="">请选择诉求类型</option>
              <option value="infra">基础设施</option>
              <option value="env">环境保护</option>
              <option value="traffic">交通出行</option>
              <option value="education">教育问题</option>
              <option value="medical">医疗卫生</option>
              <option value="housing">住房保障</option>
              <option value="employment">就业创业</option>
              <option value="other">其他</option>
            </select>
          </div>

          <div class="form-group">
            <label for="c-title">诉求标题</label>
            <input type="text" id="c-title" placeholder="简要描述您的诉求" required>
          </div>

          <div class="form-group">
            <label for="c-detail">详细描述</label>
            <textarea id="c-detail" rows="5" placeholder="请详细描述您遇到的问题、诉求内容及期望的解决方式..." required></textarea>
          </div>

          <div class="form-group">
            <label>附件上传（可选）</label>
            <div class="file-upload-area" onclick="document.getElementById('c-file').click()">
              点击上传图片、文档等佐证材料
              <input type="file" id="c-file" multiple style="display:none;">
            </div>
          </div>

          <div class="form-group">
            <label for="c-address">事发地址（可选）</label>
            <input type="text" id="c-address" placeholder="请输入问题发生的具体地址">
          </div>

          <hr class="divider">

          <div style="display:flex; gap:var(--space-4); justify-content:flex-end;">
            <button type="reset" class="btn">重置</button>
            <button type="submit" class="btn btn-primary" style="padding:var(--space-3) var(--space-6);">提交诉求</button>
          </div>
        </form>
      </div>

      <!-- 右：进度查询 -->
      <aside>
        <div class="card tracking-card">
          <h3 style="font-size:var(--text-lg); margin-bottom:var(--space-4);">进度查询</h3>
          <p style="font-family:var(--font-sans); font-size:var(--text-sm); color:var(--text-mute); margin-bottom:var(--space-4);">输入诉求编号查询处理进度</p>

          <div class="tracking-search">
            <input type="text" id="trackingIdInput" placeholder="如：TS-20260520-0023">
            <button class="btn btn-primary" onclick="searchTracking()">查询</button>
          </div>

          <div class="tracking-result" id="trackingResult">
            <div class="complaint-summary">
              <div class="summary-title" id="trackTitle">小区路灯损坏长期未修复</div>
              <div class="summary-meta" id="trackMeta">编号：TS-20260520-0023 &middot; 类型：基础设施</div>
            </div>

            <div class="timeline" id="trackTimeline">
              <!-- 动态渲染时间线 -->
            </div>

            <div style="margin-top:var(--space-6); display:none;" id="trackActionArea">
              <button class="btn btn-primary" style="width:100%; justify-content:center;" onclick="confirmResolve()">确认办结</button>
            </div>
          </div>

          <!-- 未查询时的默认提示 -->
          <div id="trackingEmpty">
            <div class="empty-state" style="padding:var(--space-8) var(--space-4);">
              <div class="empty-icon">&#x1F50D;</div>
              <p>输入编号后点击查询</p>
            </div>
          </div>
        </div>
      </aside>
    </div>
  </main>

  <footer class="site-footer">
    <div class="page-container">
      <p>政务智能问答系统 &copy; 2026 &middot; 技术支持：政务服务数据中心</p>
    </div>
  </footer>

  <script src="scripts/api.js"></script>
  <script src="scripts/common.js"></script>
  <script>
    // 自动回填已登录用户信息
    document.addEventListener("DOMContentLoaded", () => {
      const user = API.getUser();
      if (user) {
        document.getElementById("c-name").value = user.name;
        document.getElementById("c-phone").value = user.phone;
      }

      // 附件上传反馈
      const fileInput = document.getElementById("c-file");
      const uploadArea = document.querySelector(".file-upload-area");
      if (fileInput && uploadArea) {
        fileInput.addEventListener("change", () => {
          if (fileInput.files.length > 0) {
            const fileNames = Array.from(fileInput.files).map(f => f.name).join(', ');
            uploadArea.innerHTML = `已选择 ${fileInput.files.length} 个文件：<br><small>${fileNames}</small>`;
          } else {
            uploadArea.innerHTML = `点击上传图片、文档等佐证材料`;
          }
        });
      }

      // 支持从 URL 参数直接执行查询
      const urlParams = new URLSearchParams(window.location.search);
      const trackingId = urlParams.get('id');
      if (trackingId) {
        document.getElementById("trackingIdInput").value = trackingId;
        searchTracking(trackingId);
      }
    });

    // 提交诉求
    const complaintForm = document.getElementById("complaintForm");
    if (complaintForm) {
      complaintForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        
        if (!API.getToken()) {
          alert('请先登录账号后再提交诉求。');
          window.location.href = 'login.html';
          return;
        }

        const formData = new FormData();
        formData.append('type', document.getElementById("c-type").value);
        formData.append('title', document.getElementById("c-title").value);
        formData.append('detail', document.getElementById("c-detail").value);
        formData.append('address', document.getElementById("c-address").value);

        const files = document.getElementById("c-file").files;
        for (let i = 0; i < files.length; i++) {
          formData.append('files', files[i]);
        }

        try {
          const res = await API.submitComplaint(formData);
          if (res.success) {
            alert(`诉求提交成功！\n您的诉求编号为：${res.complaintId}\n您可以使用此编号在右侧进行进度查询。`);
            complaintForm.reset();
            document.querySelector(".file-upload-area").innerHTML = `点击上传图片、文档等佐证材料`;
            
            // 自动填入查询框
            document.getElementById("trackingIdInput").value = res.complaintId;
            searchTracking(res.complaintId);
          }
        } catch (err) {
          alert(err.message || '提交失败，请重试');
        }
      });
    }

    let activeTrackingId = null;

    // 查询进度
    async function searchTracking(idStr) {
      const id = idStr || document.getElementById("trackingIdInput").value.trim();
      if (!id) {
        alert('请输入诉求编号！');
        return;
      }

      try {
        const res = await API.getComplaint(id);
        if (res.success && res.complaint) {
          const c = res.complaint;
          activeTrackingId = c.id;

          document.getElementById("trackTitle").innerText = c.title;
          
          const typeNames = {
            infra: '基础设施', env: '环境保护', traffic: '交通出行',
            education: '教育问题', medical: '医疗卫生', housing: '住房保障',
            employment: '就业创业', other: '其他'
          };
          document.getElementById("trackMeta").innerHTML = `编号：${c.id} &middot; 类型：${typeNames[c.type] || c.type}`;

          // 绘制 timeline
          const timelineHtml = c.timeline.map((item, idx) => {
            let stateClass = '';
            if (item.done) {
              stateClass = 'done';
            }
            const isLastDone = item.done && (idx === c.timeline.length - 1 || !c.timeline[idx + 1].done);
            if (isLastDone && c.status !== 'resolved') {
              stateClass = 'active';
            }
            if (c.status === 'resolved' && item.title === '已办结') {
              stateClass = 'done';
            }

            return `
              <div class="timeline-item ${stateClass}">
                <div class="timeline-dot"></div>
                <div class="timeline-title">${item.title}</div>
                <div class="timeline-time">${item.time || '—'}</div>
                ${item.desc ? `<div class="timeline-desc">${item.desc}</div>` : ''}
              </div>
            `;
          }).join('');

          document.getElementById("trackTimeline").innerHTML = timelineHtml;

          // 操作按钮：仅在状态是待验收时出现“确认办结”按钮
          const actionArea = document.getElementById("trackActionArea");
          if (c.status === 'pending_verification') {
            actionArea.style.display = 'block';
          } else {
            actionArea.style.display = 'none';
          }

          // 展现结果
          document.getElementById("trackingResult").classList.add("show");
          document.getElementById("trackingEmpty").style.display = "none";
        }
      } catch (err) {
        alert(err.message || '查询失败，未找到该诉求编号');
      }
    }

    // 确认办结
    async function confirmResolve() {
      if (!activeTrackingId) return;
      if (!confirm('确认该诉求已经得到解决，并申请办结此件吗？')) return;

      try {
        const res = await API.resolveComplaint(activeTrackingId);
        if (res.success) {
          alert('确认办结成功，感谢您的反馈！');
          searchTracking(activeTrackingId);
        }
      } catch (err) {
        alert(err.message || '操作失败');
      }
    }
  </script>
</body>
</html>
