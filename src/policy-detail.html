  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="scripts/api.js"></script>
  <script src="scripts/common.js"></script>
  <script>
    function renderMarkdown(md) {
      if (!md) return '';
      // 先转义 HTML 特殊字符防止 XSS
      let safe = escapeHTML(md);
      let html = safe
        .replace(/^# (.*$)/gim, '<h1>$1</h1>')
        .replace(/^## (.*$)/gim, '<h2>$1</h2>')
        .replace(/^### (.*$)/gim, '<h3>$1</h3>')
        .replace(/^\d+\.\s(.*$)/gim, '<li>$1</li>')
        .replace(/^[\-\*]\s(.*$)/gim, '<li>$1</li>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/`([^`]+)`/g, '<code>$1</code>');

      const lines = html.split('\n');
      let result = [];
      let inList = false;

      for (let line of lines) {
        let trimmed = line.trim();
        if (!trimmed) {
          if (inList) {
            result.push('</ul>');
            inList = false;
          }
          continue;
        }

        if (trimmed.startsWith('<li>')) {
          if (!inList) {
            result.push('<ul>');
            inList = true;
          }
          result.push(line);
        } else {
          if (inList) {
            result.push('</ul>');
            inList = false;
          }
          if (trimmed.startsWith('<h') || trimmed.startsWith('<table')) {
            result.push(line);
          } else {
            result.push(`<p>${line}</p>`);
          }
        }
      }
      if (inList) result.push('</ul>');

      return result.join('\n');
    }

    async function loadPolicyDetail() {
      const urlParams = new URLSearchParams(window.location.search);
      const policyId = urlParams.get('id');
      if (!policyId) {
        alert('未指定政策ID！');
        window.location.href = 'policies.html';
        return;
      }

      try {
        const res = await API.getPolicy(policyId);
        if (res.success && res.policy) {
          const p = res.policy;
          document.getElementById("policyTitle").innerText = p.title;
          
          let badgeClass = 'badge-success';
          if (p.status === '征求意见') badgeClass = 'badge-warning';
          if (p.status === '已废止') badgeClass = 'badge-error';

          document.getElementById("policyMeta").innerHTML = `
            <span class="badge ${badgeClass}">${escapeHTML(p.status)}</span>
            <span>发布日期：${escapeHTML(p.publishDate)}</span>
            <span>发文机关：${escapeHTML(p.department)}</span>
            <span>索引号：ZFCG-2026-00${escapeHTML(p.id)}</span>
          `;

          document.getElementById("policyBody").innerHTML = renderMarkdown(p.content);

          // 更新 AI 解读链接
          document.getElementById("aiInterpretBtn").href = `policy-analysis.html?id=${escapeHTML(p.id)}`;
        }
      } catch (err) {
        document.getElementById("policyTitle").innerText = '政策读取失败';
        document.getElementById("policyBody").innerHTML = `<div style="color:var(--status-error); text-align:center; padding:40px;">错误: ${escapeHTML(err.message)}</div>`;
      }
    }

    // 下载 PDF 政策文件
    function downloadPolicyPDF() {
      const element = document.querySelector('.policy-article');
      const title = document.getElementById("policyTitle").innerText || '政策法规';
      
      const opt = {
        margin:       15,
        filename:     `${title}.pdf`,
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { scale: 2, useCORS: true },
        jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
      };
      
      html2pdf().set(opt).from(element).save();
    }

    loadPolicyDetail();
  </script>
