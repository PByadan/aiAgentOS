<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>行政审批 — 政务智能问答系统</title>
  <link rel="stylesheet" href="../design/tokens.css">
  <link rel="stylesheet" href="styles/common.css">
  <style>
    .approval-layout {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: var(--space-8);
    }
    .approval-form-card { padding: var(--space-8); }
    .step-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      margin-bottom: var(--space-8);
      font-family: var(--font-sans);
      font-size: var(--text-sm);
    }
    .step {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      color: var(--text-faint);
    }
    .step .step-num {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 2px solid var(--rule);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: var(--text-xs);
    }
    .step.active { color: var(--accent); }
    .step.active .step-num { border-color: var(--accent); background: var(--accent); color: #fff; }
    .step.done { color: var(--status-success); }
    .step.done .step-num { border-color: var(--status-success); background: var(--status-success); color: #fff; }
    .step-line {
      width: 40px;
      height: 1px;
      background: var(--rule);
    }
    .step.done + .step-line { background: var(--status-success); }
    .form-row-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-4);
    }
    .my-approvals { position: sticky; top: calc(var(--header-height) + var(--space-8)); }
    .approval-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-3) 0;
      border-bottom: 1px solid var(--rule);
      font-family: var(--font-sans);
      font-size: var(--text-sm);
    }
    .approval-item:last-child { border-bottom: none; }
    .approval-item .item-name {
      color: var(--text-2);
      font-weight: 500;
    }
    .approval-item .item-date {
      font-size: var(--text-xs);
      color: var(--text-mute);
    }
    @media (max-width: 768px) {
      .approval-layout { grid-template-columns: 1fr; }
      .form-row-3 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="page-container">
      <a href="../index.html" class="site-logo">
        <span class="logo-icon">政</span>
        政务智能问答系统
      </a>
      <nav class="site-nav" id="mainNav">
        <a href="../index.html">首页</a>
        <a href="policies.html">政策法规</a>
        <a href="policy-analysis.html">智能解读</a>
        <a href="complaint.html">民生诉求</a>
        <a href="approval.html" class="active">行政审批</a>
        <a href="dashboard.html">数据看板</a>
      </nav>
      <div class="nav-user">
        <a href="profile.html" class="btn btn-ghost" style="font-size:var(--text-sm)">个人中心</a>
      </div>
      <button class="nav-toggle" aria-label="菜单">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main class="page-container" style="padding-top:var(--space-8); padding-bottom:var(--space-16);">
    <nav class="breadcrumb">
      <a href="../index.html">首页</a>
      <span class="sep">/</span>
      <span class="current">行政审批</span>
    </nav>

    <div class="page-title-bar" style="padding-top:0;">
      <h1>行政审批</h1>
      <p class="subtitle">在线提交审批申请，实时跟踪审批进度</p>
    </div>

    <div class="approval-layout">
      <!-- 左：申请表单 -->
      <div class="card approval-form-card">
        <!-- 步骤指示器 -->
        <div class="step-indicator">
          <div class="step active"><span class="step-num">1</span> 填写信息</div>
          <div class="step-line"></div>
          <div class="step"><span class="step-num">2</span> 上传材料</div>
          <div class="step-line"></div>
          <div class="step"><span class="step-num">3</span> 确认提交</div>
        </div>

        <h2 style="font-size:var(--text-lg); margin-bottom:var(--space-6);">第一步：填写申请信息</h2>

        <form id="approvalForm">
          <div class="form-group">
            <label for="a-type">审批事项</label>
            <select id="a-type" required>
              <option value="">请选择审批事项</option>
              <option value="biz-license">营业执照办理</option>
              <option value="build-permit">建设工程规划许可</option>
              <option value="env-impact">环境影响评价审批</option>
              <option value="fire-check">消防设计审查</option>
              <option value="land-use">建设用地规划许可</option>
              <option value="food-permit">食品经营许可</option>
              <option value="other">其他事项</option>
            </select>
          </div>

          <div class="form-row-3">
            <div class="form-group">
              <label for="a-name">申请人/单位</label>
              <input type="text" id="a-name" placeholder="名称" required>
            </div>
            <div class="form-group">
              <label for="a-contact">联系人</label>
              <input type="text" id="a-contact" placeholder="姓名" required>
            </div>
            <div class="form-group">
              <label for="a-phone">联系电话</label>
              <input type="tel" id="a-phone" placeholder="手机号" required>
            </div>
          </div>

          <div class="form-group">
            <label for="a-idnum">统一社会信用代码 / 身份证号</label>
            <input type="text" id="a-idnum" placeholder="请输入证件号码" required>
          </div>

          <div class="form-group">
            <label for="a-desc">申请事项说明</label>
            <textarea id="a-desc" rows="4" placeholder="请简要说明申请事项的具体内容和理由..." required></textarea>
          </div>

          <div class="form-group">
            <label>上传申请材料</label>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:var(--space-3);">
              <div class="file-upload-area" onclick="this.querySelector('input').click()" style="padding:var(--space-6) var(--space-3);" id="bizLicenseUpload">
                <span>上传营业执照</span>
                <input type="file" id="bizLicenseInput" accept=".pdf,.jpg,.png" style="display:none;">
              </div>
              <div class="file-upload-area" onclick="this.querySelector('input').click()" style="padding:var(--space-6) var(--space-3);" id="idCardUpload">
                <span>上传身份证</span>
                <input type="file" id="idCardInput" accept=".pdf,.jpg,.png" style="display:none;">
              </div>
            </div>
          </div>

          <div class="form-group">
            <label>
              <input type="checkbox" required style="width:auto; padding:0; vertical-align:middle; margin-right:var(--space-2);">
              我已阅读并同意《行政审批网上办理须知》
            </label>
          </div>

          <hr class="divider">

          <div style="display:flex; gap:var(--space-4); justify-content:flex-end;">
            <button type="reset" class="btn">重置</button>
            <button type="submit" class="btn btn-primary" style="padding:var(--space-3) var(--space-8);">提交申请</button>
          </div>
        </form>
      </div>

      <!-- 右：我的审批记录 -->
      <aside>
        <div class="card my-approvals">
          <h3 style="font-size:var(--text-lg); margin-bottom:var(--space-4);">我的审批</h3>

          <div class="tabs" id="approvalTabs">
            <button class="tab-btn active" data-tab="tab-pending">进行中</button>
            <button class="tab-btn" data-tab="tab-done">已完成</button>
          </div>

          <div id="tab-pending" class="tab-panel">
            <!-- 动态加载进行中 -->
          </div>

          <div id="tab-done" class="tab-panel" style="display:none;">
            <!-- 动态加载已完成 -->
          </div>

          <hr class="divider">

          <!-- 审批流程说明 -->
          <h3 style="font-size:var(--text-sm); font-family:var(--font-sans); font-weight:600; color:var(--text-mute); margin-bottom:var(--space-3);">审批流程</h3>
          <div class="timeline" style="font-size:var(--text-sm);">
            <div class="timeline-item done">
              <div class="timeline-dot"></div>
              <div class="timeline-title">提交申请</div>
            </div>
            <div class="timeline-item done">
              <div class="timeline-dot"></div>
              <div class="timeline-title">材料初审</div>
            </div>
            <div class="timeline-item active">
              <div class="timeline-dot"></div>
              <div class="timeline-title">部门审核</div>
            </div>
            <div class="timeline-item">
              <div class="timeline-dot"></div>
              <div class="timeline-title">领导审批</div>
            </div>
            <div class="timeline-item">
              <div class="timeline-dot"></div>
              <div class="timeline-title">办结出证</div>
            </div>
          </div>
        </div>
      </aside>
    </div>
  </main>

  <footer class="site-footer">
    <div class="page-container">
      <p>政务智能问答系统 &copy; 2026 &middot; 技术支持：政务服务数据中心</p>
    </div>
  </footer>

  <script src="scripts/api.js"></script>
  <script src="scripts/common.js"></script>
  <script>
    // 自动回填已登录用户信息
    document.addEventListener("DOMContentLoaded", () => {
      const user = API.getUser();
      if (user) {
        document.getElementById("a-name").value = user.name;
        document.getElementById("a-contact").value = user.name;
        document.getElementById("a-phone").value = user.phone;
        document.getElementById("a-idnum").value = user.idnum || '';
      }

      // 文件上传命名提示
      const setupUploadHint = (inputId, wrapperId, defaultLabel) => {
        const input = document.getElementById(inputId);
        const wrapper = document.getElementById(wrapperId);
        if (input && wrapper) {
          input.addEventListener("change", () => {
            if (input.files.length > 0) {
              wrapper.querySelector("span").innerText = input.files[0].name;
              wrapper.style.borderColor = 'var(--accent)';
            } else {
              wrapper.querySelector("span").innerText = defaultLabel;
              wrapper.style.borderColor = '';
            }
          });
        }
      };

      setupUploadHint("bizLicenseInput", "bizLicenseUpload", "上传营业执照");
      setupUploadHint("idCardInput", "idCardUpload", "上传身份证");

      loadMyApprovals();
    });

    // 提交审批
    const approvalForm = document.getElementById("approvalForm");
    if (approvalForm) {
      approvalForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        
        if (!API.getToken()) {
          alert('请先登录账号后再提交行政审批申请。');
          window.location.href = 'login.html';
          return;
        }

        const formData = new FormData();
        formData.append('type', document.getElementById("a-type").value);
        formData.append('applicant', document.getElementById("a-name").value);
        formData.append('contact', document.getElementById("a-contact").value);
        formData.append('phone', document.getElementById("a-phone").value);
        formData.append('idnum', document.getElementById("a-idnum").value);
        formData.append('desc', document.getElementById("a-desc").value);

        const bizLicenseFile = document.getElementById("bizLicenseInput").files[0];
        const idCardFile = document.getElementById("idCardInput").files[0];

        if (bizLicenseFile) formData.append('bizLicense', bizLicenseFile);
        if (idCardFile) formData.append('idCard', idCardFile);

        try {
          const res = await API.submitApproval(formData);
          if (res.success) {
            alert(`行政审批申请提交成功！\n申请编号为：${res.approvalId}`);
            approvalForm.reset();
            document.getElementById("bizLicenseUpload").querySelector("span").innerText = "上传营业执照";
            document.getElementById("bizLicenseUpload").style.borderColor = '';
            document.getElementById("idCardUpload").querySelector("span").innerText = "上传身份证";
            document.getElementById("idCardUpload").style.borderColor = '';
            
            loadMyApprovals(); // 刷新我的审批列表
          }
        } catch (err) {
          alert(err.message || '提交失败，请重试');
        }
      });
    }

    // 动态渲染我的审批
    async function loadMyApprovals() {
      if (!API.getToken()) return;

      try {
        const res = await API.getMyApprovals();
        if (res.success) {
          const pendingContainer = document.getElementById("tab-pending");
          const doneContainer = document.getElementById("tab-done");

          const statusBadges = {
            'processing': '<span class="badge badge-warning">审核中</span>',
            'material_needed': '<span class="badge badge-info">待补充材料</span>',
            'approved': '<span class="badge badge-success">已通过</span>',
            'rejected': '<span class="badge badge-error">已驳回</span>'
          };

          const pendingItems = res.approvals.filter(a => a.status === 'processing' || a.status === 'material_needed');
          const doneItems = res.approvals.filter(a => a.status === 'approved' || a.status === 'rejected');

          const renderList = (items) => {
            if (items.length === 0) {
              return '<p style="text-align:center; color:var(--text-mute); font-size:var(--text-xs); padding:20px;">暂无相关记录</p>';
            }
            return items.map(a => `
              <div class="approval-item">
                <div>
                  <div class="item-name">${a.typeName}</div>
                  <div class="item-date">编号 ${a.id}</div>
                </div>
                ${statusBadges[a.status] || a.status}
              </div>
            `).join('');
          };

          pendingContainer.innerHTML = renderList(pendingItems);
          doneContainer.innerHTML = renderList(doneItems);
        }
      } catch (err) {
        console.error('加载审批列表失败:', err);
      }
    }
  </script>
</body>
</html>
