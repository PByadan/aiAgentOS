<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>权限管理 — aiAgentOS</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo"><h1>aiAgentOS</h1><small>v1.0</small></div>
      <nav></nav>
    </aside>
    <main class="main">
      <div class="page-header">
        <h2>权限管理</h2>
        <div class="breadcrumb">aiAgentOS / 权限管理</div>
      </div>
      <div class="card">
        <div class="card-header">
          <h3>权限矩阵</h3>
          <button class="btn btn-sm btn-primary" onclick="saveAll()">保存更改</button>
        </div>
        <p style="color:var(--text3); font-size:12px; margin-bottom:16px;">勾选/取消权限后点击"保存更改"</p>
        <table id="perm-table">
          <thead id="perm-head"></thead>
          <tbody id="perm-body"></tbody>
        </table>
      </div>
    </main>
  </div>
  <script src="/js/app.js"></script>
  <script>
    let permData = {};
    document.addEventListener('DOMContentLoaded', () => {
      if (!getToken()) { location.href = '/pages/login.html'; return; }
      renderSidebar('permissions');
      loadPermissions();
    });
    async function loadPermissions() {
      const res = await api('/permissions');
      if (!res.ok) return;
      permData = res;
      const roles = res.roles;
      const perms = res.permissions;
      const rpMap = {};
      res.rolePermissions.forEach(rp => { rpMap[rp.roleId] = rp.permissionIds || []; });

      document.getElementById('perm-head').innerHTML = '<tr><th style="text-align:left;">权限</th><th>模块</th>' +
        roles.map(r => `<th>${r.name}<br><small style="color:var(--text3);">${r.id}</small></th>`).join('') + '</tr>';

      document.getElementById('perm-body').innerHTML = perms.map(p => {
        const cells = roles.map(r => {
          const checked = (rpMap[r.id] || []).includes(p.id) ? 'checked' : '';
          return `<td style="text-align:center;"><input type="checkbox" data-role="${r.id}" data-perm="${p.id}" ${checked}></td>`;
        }).join('');
        return `<tr><td>${p.name}</td><td><span class="badge badge-blue">${p.module}</span></td>${cells}</tr>`;
      }).join('');
    }
    async function saveAll() {
      const roles = permData.roles;
      for (const r of roles) {
        const cbs = document.querySelectorAll(`input[data-role="${r.id}"]`);
        const ids = [];
        cbs.forEach(cb => { if (cb.checked) ids.push(cb.dataset.perm); });
        await api(`/permissions/${r.id}`, { method: 'PUT', body: JSON.stringify({ permissionIds: ids }) });
      }
      alert('权限已更新');
      loadPermissions();
    }
  </script>
</body>
</html>
