<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>对话 — aiAgentOS</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo"><h1>aiAgentOS</h1><small>v1.0</small></div>
      <nav></nav>
    </aside>
    <main class="main">
      <div class="page-header">
        <h2>对话</h2>
        <div class="breadcrumb">aiAgentOS / 对话</div>
      </div>
      <div class="card" style="padding:0; overflow:hidden;">
        <div class="chat-box" id="chatBox">
          <div class="chat-msg bot">
            <div class="avatar">&#x1F916;</div>
            <div class="bubble">你好！我是 aiAgentOS 的智能助手，有什么可以帮助你的？</div>
          </div>
        </div>
        <div class="chat-input" style="padding:12px 16px; border-top:1px solid var(--border);">
          <input type="text" id="chatInput" placeholder="输入消息..." style="flex:1;">
          <button class="btn btn-primary" onclick="sendChat()">发送</button>
        </div>
      </div>
    </main>
  </div>
  <script src="/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!getToken()) { location.href = '/pages/login.html'; return; }
      renderSidebar('chat');
      document.getElementById('chatInput').addEventListener('keydown', e => { if (e.key === 'Enter') sendChat(); });
    });
    async function sendChat() {
      const input = document.getElementById('chatInput');
      const msg = input.value.trim();
      if (!msg) return;
      input.value = '';
      appendMsg('user', msg);
      appendMsg('bot', '正在思考...');
      const res = await api('/agents/chat-agent/execute', { method: 'POST', body: JSON.stringify({ message: msg }) });
      const box = document.getElementById('chatBox');
      const last = box.querySelector('.chat-msg.bot:last-child .bubble');
      if (last) last.textContent = res.ok ? res.result.reply : '错误: ' + (res.error || '未知');
    }
    function appendMsg(role, text) {
      const box = document.getElementById('chatBox');
      const div = document.createElement('div');
      div.className = `chat-msg ${role}`;
      div.innerHTML = `<div class="avatar">${role === 'user' ? '&#x1F464;' : '&#x1F916;'}</div><div class="bubble">${text}</div>`;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }
  </script>
</body>
</html>
