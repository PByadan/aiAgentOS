<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户管理 — aiAgentOS</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo"><h1>aiAgentOS</h1><small>v1.0</small></div>
      <nav></nav>
    </aside>
    <main class="main">
      <div class="page-header">
        <h2>用户管理</h2>
        <div class="breadcrumb">aiAgentOS / 用户管理</div>
      </div>
      <div class="card">
        <div class="card-header">
          <h3>所有用户</h3>
          <button class="btn btn-sm btn-primary" onclick="showCreate()">新建用户</button>
        </div>
        <table>
          <thead><tr><th>ID</th><th>用户名</th><th>角色</th><th>状态</th><th>创建时间</th><th>操作</th></tr></thead>
          <tbody id="user-table"></tbody>
        </table>
      </div>
      <div id="modal" class="card" style="display:none; margin-top:16px;">
        <h3>新建用户</h3>
        <div class="form-group" style="margin-top:12px;">
          <label>用户名</label>
          <input type="text" id="new-username" placeholder="输入用户名">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="new-password" placeholder="输入密码">
        </div>
        <div class="form-group">
          <label>角色</label>
          <select id="new-role">
            <option value="user">普通用户</option>
            <option value="editor">编辑员</option>
            <option value="admin">管理员</option>
          </select>
        </div>
        <div style="display:flex; gap:8px;">
          <button class="btn btn-primary" onclick="createUser()">创建</button>
          <button class="btn" onclick="document.getElementById('modal').style.display='none'">取消</button>
        </div>
      </div>
    </main>
  </div>
  <script src="/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!getToken()) { location.href = '/pages/login.html'; return; }
      renderSidebar('users');
      loadUsers();
    });
    async function loadUsers() {
      const res = await api('/users');
      if (!res.ok) { alert(res.error); return; }
      const roleNames = { admin: '管理员', editor: '编辑员', user: '普通用户' };
      const roleColors = { admin: 'badge-red', editor: 'badge-orange', user: 'badge-blue' };
      document.getElementById('user-table').innerHTML = res.users.map(u => `
        <tr>
          <td>${u.id}</td>
          <td>${u.username}</td>
          <td>
            <select onchange="changeRole('${u.id}', this.value)" style="background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-size:12px;">
              <option value="user" ${u.role==='user'?'selected':''}>普通用户</option>
              <option value="editor" ${u.role==='editor'?'selected':''}>编辑员</option>
              <option value="admin" ${u.role==='admin'?'selected':''}>管理员</option>
            </select>
          </td>
          <td>${u.disabled ? '<span class="badge badge-red">已禁用</span>' : '<span class="badge badge-green">正常</span>'}</td>
          <td style="font-size:12px;color:var(--text3);">${u.createdAt?.slice(0,10) || '-'}</td>
          <td style="display:flex;gap:4px;">
            <button class="btn btn-sm" onclick="toggleUser('${u.id}', ${!u.disabled})">${u.disabled ? '启用' : '禁用'}</button>
            <button class="btn btn-sm" style="color:var(--red);" onclick="deleteUser('${u.id}','${u.username}')">删除</button>
          </td>
        </tr>
      `).join('');
    }
    function showCreate() {
      document.getElementById('new-username').value = '';
      document.getElementById('new-password').value = '';
      document.getElementById('new-role').value = 'user';
      document.getElementById('modal').style.display = 'block';
    }
    async function createUser() {
      const username = document.getElementById('new-username').value.trim();
      const password = document.getElementById('new-password').value.trim();
      const role = document.getElementById('new-role').value;
      if (!username || !password) { alert('用户名和密码必填'); return; }
      const res = await api('/users', { method: 'POST', body: JSON.stringify({ username, password, role }) });
      if (!res.ok) { alert(res.error); return; }
      document.getElementById('modal').style.display = 'none';
      loadUsers();
    }
    async function toggleUser(id, disabled) {
      await api(`/users/${id}`, { method: 'PUT', body: JSON.stringify({ disabled }) });
      loadUsers();
    }
    async function changeRole(id, newRole) {
      await api(`/users/${id}`, { method: 'PUT', body: JSON.stringify({ role: newRole }) });
    }
    async function deleteUser(id, name) {
      if (!confirm('确定删除用户 "' + name + '" ？此操作不可恢复。')) return;
      const res = await api(`/users/${id}`, { method: 'DELETE' });
      if (!res.ok) { alert(res.error); return; }
      loadUsers();
    }
  </script>
</body>
</html>
